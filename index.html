<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APEX POINT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
    user-select: none;
  }

  #canvas { display: block; width: 100vw; height: 100vh; }

  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
    transition: opacity 0.5s ease;
  }
  .hidden { display: none !important; opacity: 0; pointer-events: none; }

  .game-title {
    font-family: 'Orbitron'; font-size: clamp(40px, 10vw, 90px); font-weight: 900;
    background: linear-gradient(#fff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 5px;
  }
  
  .sub-title { color: #888; font-weight: 700; letter-spacing: 4px; margin-bottom: 40px; font-size: 14px; }

  .car-selector { display: flex; gap: 20px; margin-bottom: 30px; }
  .car-opt {
    width: 80px; height: 50px; border: 3px solid #333; border-radius: 10px;
    cursor: pointer; transition: 0.3s; position: relative;
  }
  .car-opt.active { border-color: #00ff88; transform: scale(1.1); box-shadow: 0 0 25px rgba(0,255,136,0.4); }
  .car-opt.active::after { 
    content: '✓'; position: absolute; top: -10px; right: -10px; 
    background: #00ff88; color: #000; border-radius: 50%; width: 20px; 
    height: 20px; display: flex; align-items: center; justify-content: center; 
    font-size: 12px; font-weight: bold; 
  }

  .btn {
    pointer-events: all; cursor: pointer;
    background: #00ff88; color: #000;
    font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900;
    padding: 18px 70px; border: none; border-radius: 50px;
    margin-bottom: 25px; transition: 0.2s; box-shadow: 0 10px 30px rgba(0,255,136,0.3);
    text-transform: uppercase;
  }
  .btn:active { transform: scale(0.95); }

  .thanks-area {
    text-align: center; background: rgba(255,255,255,0.05);
    padding: 20px 40px; border-radius: 20px;
    border: 1px solid rgba(0,255,136,0.2); max-width: 80%;
  }
  .thanks-title {
    font-family: 'Orbitron'; font-size: 10px; color: #00ff88;
    letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase;
  }
  .thanks-list { display: flex; gap: 20px; justify-content: center; font-weight: 700; color: #eee; font-size: 16px; }

  #game-over-screen { background: rgba(0,0,0,0.9); z-index: 200; }
  .over-title { font-family: 'Orbitron'; color: #ff4444; font-size: 50px; margin-bottom: 20px; font-weight: 900; }
  .final-score-val { font-family: 'Orbitron'; font-size: 60px; color: #fff; margin-bottom: 40px; }

  #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 25px; }
  #points-card { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 10px 40px; border-radius: 20px; border: 1px solid rgba(0,255,136,0.2); text-align: center; }
  #score-val { font-family: 'Orbitron'; font-size: 40px; font-weight: 900; }
  
  #hull-card { position: absolute; top: 25px; left: 25px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 15px; }
  #durability { font-size: 24px; color: #ff4444; letter-spacing: 5px; }

  #nitro-card { position: absolute; bottom: 250px; left: 25px; width: 200px; }
  #nitro-bar { height: 8px; width: 100%; background: #222; border-radius: 4px; overflow: hidden; }
  #nitro-fill { height: 100%; background: #00f2fe; width: 100%; transition: width 0.1s; }

  #speed-card { position: absolute; bottom: 240px; right: 25px; text-align: right; }
  #speed-val { font-family: 'Orbitron'; font-size: 70px; font-weight: 900; font-style: italic; line-height: 1; }

  #immortal-timer {
    position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
    font-family: 'Orbitron'; color: #ff00ff; font-weight: 900; font-size: 24px;
    text-shadow: 0 0 10px #ff00ff; display: none; z-index: 50;
  }

  #monster-warning {
    position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Orbitron'; font-size: 30px; font-weight: 900; color: #ff0000;
    text-shadow: 0 0 20px rgba(255,0,0,0.8); display: none; z-index: 200;
  }

  #controls { position: fixed; bottom: 40px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 20; pointer-events: none; }
  .ctrl-btn { pointer-events: all; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; font-size: 25px; backdrop-filter: blur(5px); }
  .pedal { width: 90px; height: 140px; border-radius: 20px; font-size: 16px; font-weight: 900; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="immortal-timer">IMMORTAL: 0s</div>
<div id="monster-warning">MONSTER DETECTED</div>

<div class="overlay" id="home-screen">
  <div class="game-title">Apex Point</div>
  <div class="sub-title">HIGHWAY CHALLENGE</div>
  <p style="margin-bottom: 15px; font-size: 12px; letter-spacing: 2px; color: #aaa;">SELECT YOUR RIG</p>
  <div class="car-selector">
    <div class="car-opt active" onclick="setCar(0x0066ff, this)" style="background:#0066ff"></div>
    <div class="car-opt" onclick="setCar(0xff3300, this)" style="background:#ff3300"></div>
    <div class="car-opt" onclick="setCar(0xeeeeee, this)" style="background:#eeeeee"></div>
  </div>
  <button class="btn" onclick="initGame()">Start Drive</button>
  <div class="thanks-area">
    <div class="thanks-title">Special Thanks</div>
    <div class="thanks-list"><span>EDWIN</span><span>DEV</span><span>ASHMITH</span></div>
  </div>
</div>

<div class="overlay hidden" id="game-over-screen">
  <div class="over-title">TOTALED</div>
  <div class="final-score-val" id="final-score-display">0</div>
  <button class="btn" onclick="initGame()">Restart</button>
  <button class="btn" style="background:#333; color:#fff; font-size:14px; padding:10px 30px" onclick="showHome()">Menu</button>
</div>

<div id="hud" class="hidden">
  <div id="hull-card">
    <div style="font-size:10px; color:#aaa;">CHASSIS</div>
    <div id="durability">♥♥♥</div>
  </div>
  <div id="points-card">
    <div style="font-size:10px; color:#00ff88;">POINTS</div>
    <div id="score-val">0</div>
  </div>
  <div id="nitro-card">
    <div style="font-size:10px; color:#00f2fe;">NITRO</div>
    <div id="nitro-bar"><div id="nitro-fill"></div></div>
  </div>
  <div id="speed-card">
    <div id="speed-val">0</div>
    <div style="font-size:14px; color:#00ff88;">KM/H</div>
  </div>
</div>

<div id="controls" class="hidden">
  <div style="display:flex; gap:10px">
    <div class="ctrl-btn" id="btn-left">◀</div>
    <div class="ctrl-btn" id="btn-right">▶</div>
  </div>
  <div style="display:flex; gap:10px; align-items: flex-end;">
    <div class="ctrl-btn pedal" id="btn-brake" style="background:rgba(255,0,0,0.1)">BRAKE</div>
    <div style="display:flex; flex-direction:column; gap:10px">
        <div class="ctrl-btn" id="btn-nitro" style="height:40px; width:100px; border-radius:20px; font-size:12px; background:rgba(0,242,254,0.2)">NITRO</div>
        <div class="ctrl-btn pedal" id="btn-accel" style="border-color:#00ff88; color:#00ff88">GAS</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let gameState = 'HOME', score = 0, speed = 0, nitro = 100, playerX = 0, lives = 3;
let selectedColor = 0x0066ff, playerY = 0, playerVY = 0, isJumping = false, immortalTime = 0;
let isDay = true, currentMonster = null, player;
const traffic = [], powerups = [], roadSegments = [];
const keys = { left: false, right: false, accel: false, brake: false, nitro: false };

const MAX_BASE_SPEED = 2.61, MAX_NITRO_SPEED = 3.04;
const AI_COLORS = [0xff3300, 0x00ff00, 0x0066ff, 0xffff00, 0xff00ff, 0x00ffff, 0xeeeeee];

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const ambientLight = new THREE.AmbientLight(0xffffff, 1.3);
scene.add(ambientLight);
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(50, 100, 50);
scene.add(sun);

function createCar(color) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 4.8), new THREE.MeshStandardMaterial({color: color, metalness: 0.8, roughness: 0.2}));
    body.position.y = 0.5; group.add(body);
    const cab = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 2.0), new THREE.MeshStandardMaterial({color: 0x111111}));
    cab.position.set(0, 1.1, 0.2); group.add(cab);
    const wGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16); wGeo.rotateZ(Math.PI/2);
    [[-1,0.4,1.5],[1,0.4,1.5],[-1,0.4,-1.5],[1,0.4,-1.5]].forEach(p => {
        const w = new THREE.Mesh(wGeo, new THREE.MeshStandardMaterial({color: 0x111111})); w.position.set(...p); group.add(w);
    });
    return group;
}

function createTruck(isRamp = false) {
    const group = new THREE.Group();
    const tCol = isRamp ? 0xffcc00 : 0x2c3e50;
    const cab = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.4, 2.5), new THREE.MeshStandardMaterial({color: tCol}));
    cab.position.set(0, 1.2, -4); group.add(cab);
    if(isRamp) {
        const ramp = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.3, 11), new THREE.MeshStandardMaterial({color: 0x222222}));
        ramp.rotation.x = -0.18; ramp.position.set(0, 0.9, 1); group.add(ramp);
        group.type = 'ramp';
    } else {
        const trailer = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.8, 10), new THREE.MeshStandardMaterial({color: 0x95a5a6}));
        trailer.position.set(0, 1.4, 2); group.add(trailer);
        group.type = 'truck';
    }
    return group;
}

function createPowerUp(type) {
    const col = type === 'NITRO' ? 0x00f2fe : (type === 'STAR' ? 0xff00ff : 0xff4444);
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 2}));
    mesh.type = 'powerup'; mesh.powerType = type; return mesh;
}

function createRoad(z) {
    const group = new THREE.Group();
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
    ground.rotation.x = -Math.PI/2; group.add(ground);
    group.position.z = z; scene.add(group); return group;
}

function setCar(color, el) {
    selectedColor = color;
    document.querySelectorAll('.car-opt').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
}

function initGame() {
    gameState = 'PLAY'; score = 0; speed = 0; nitro = 100; lives = 3; playerX = 0; playerY = 0; immortalTime = 0;
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
    document.getElementById('durability').innerText = '♥♥♥';
    if(player) scene.remove(player);
    player = createCar(selectedColor); scene.add(player);
    traffic.forEach(t => scene.remove(t)); traffic.length = 0;
    powerups.forEach(p => scene.remove(p)); powerups.length = 0;
    roadSegments.forEach(r => scene.remove(r)); roadSegments.length = 0;
    for(let i=0; i<15; i++) roadSegments.push(createRoad(-i * 100));
}

function spawn() {
    if(gameState !== 'PLAY') return;
    const lane = [-9, -3, 3, 9][Math.floor(Math.random()*4)];
    if(Math.random() < 0.2) {
        const pType = Math.random() < 0.15 ? 'STAR' : (Math.random() > 0.4 ? 'NITRO' : 'REPAIR');
        const p = createPowerUp(pType); p.position.set(lane, 1.5, -800); scene.add(p); powerups.push(p);
    } else {
        const r = Math.random();
        const t = r > 0.8 ? createTruck(true) : (r > 0.6 ? createTruck(false) : createCar(AI_COLORS[Math.floor(Math.random()*AI_COLORS.length)]));
        t.position.set(lane, 0, -800); scene.add(t); traffic.push(t);
    }
}
setInterval(spawn, 550);

function update() {
    if(gameState !== 'PLAY') return;
    document.getElementById('score-val').innerText = Math.floor(score);
    document.getElementById('speed-val').innerText = Math.floor(speed * 100);
    document.getElementById('nitro-fill').style.width = nitro + '%';

    if(keys.left) playerX -= 0.65; if(keys.right) playerX += 0.65;
    playerX = Math.max(-12, Math.min(12, playerX));
    player.position.x += (playerX - player.position.x) * 0.25;
    player.rotation.z = (playerX - player.position.x) * -0.2;

    const isN = keys.nitro && nitro > 1;
    let target = keys.accel ? MAX_BASE_SPEED : 0.8;
    if(keys.brake) target = 0.1;
    if(isN) { target = MAX_NITRO_SPEED; nitro -= 0.9; } else if(nitro < 100) nitro += 0.15;
    speed += (target - speed) * 0.05; score += speed * 0.07; 

    if(isJumping) { playerVY -= 0.02; playerY += playerVY; if(playerY <= 0) { playerY = 0; isJumping = false; } }
    player.position.y = playerY;
    roadSegments.forEach(r => { r.position.z += speed; if(r.position.z > 100) r.position.z -= 1500; });

    for(let i=traffic.length-1; i>=0; i--) {
        const t = traffic[i]; t.position.z += speed - 1.5;
        const dx = Math.abs(t.position.x - player.position.x), dz = t.position.z - player.position.z;
        if(t.type === 'ramp' && dx < 2.0 && dz > -10 && dz < -4 && !isJumping) { isJumping = true; playerVY = 0.5 + (speed * 0.04); }
        else if(dx < 2.2 && Math.abs(dz) < 4.5 && playerY < 1.0) {
            if(immortalTime <= 0) { lives--; speed *= 0.2; scene.remove(t); traffic.splice(i,1); document.getElementById('durability').innerText = '♥'.repeat(lives); if(lives <= 0) gameOver(); }
            else { t.position.y += 2; } continue;
        }
        if(t.position.z > 50) { scene.remove(t); traffic.splice(i,1); }
    }

    if(immortalTime > 0) { 
        immortalTime -= 1/60; document.getElementById('immortal-timer').style.display = 'block'; 
        document.getElementById('immortal-timer').innerText = `IMMORTAL: ${Math.ceil(immortalTime)}s`;
    } else { document.getElementById('immortal-timer').style.display = 'none'; }

    for(let i=powerups.length-1; i>=0; i--) {
        const p = powerups[i]; p.position.z += speed; p.rotation.y += 0.05;
        if(Math.abs(p.position.x - player.position.x) < 2 && Math.abs(p.position.z - player.position.z) < 3) {
            if(p.powerType === 'NITRO') nitro = Math.min(100, nitro + 40);
            if(p.powerType === 'REPAIR') { lives = Math.min(3, lives + 1); document.getElementById('durability').innerText = '♥'.repeat(lives); }
            if(p.powerType === 'STAR') immortalTime = 10;
            scene.remove(p); powerups.splice(i,1);
        } else if(p.position.z > 50) { scene.remove(p); powerups.splice(i,1); }
    }
}

function gameOver() { gameState = 'OVER'; document.getElementById('hud').classList.add('hidden'); document.getElementById('controls').classList.add('hidden'); document.getElementById('game-over-screen').classList.remove('hidden'); document.getElementById('final-score-display').innerText = Math.floor(score); }
function showHome() { gameState = 'HOME'; document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('home-screen').classList.remove('hidden'); }

function animate() { requestAnimationFrame(animate); update(); camera.position.set(player?.position.x * 0.5 || 0, 6 + (speed * 0.5), 12); camera.lookAt(player?.position.x || 0, 2, -20); renderer.render(scene, camera); }

const bind = (id, k) => {
    const el = document.getElementById(id);
    const s = (e) => { e.preventDefault(); keys[k] = true; };
    const n = (e) => { e.preventDefault(); keys[k] = false; };
    el.addEventListener('mousedown', s); el.addEventListener('mouseup', n); el.addEventListener('touchstart', s); el.addEventListener('touchend', n);
};
bind('btn-left', 'left'); bind('btn-right', 'right'); bind('btn-accel', 'accel'); bind('btn-brake', 'brake'); bind('btn-nitro', 'nitro');

window.addEventListener('keydown', e => { if(e.key==='ArrowLeft') keys.left=true; if(e.key==='ArrowRight') keys.right=true; if(e.key==='ArrowUp') keys.accel=true; if(e.key==='ArrowDown') keys.brake=true; if(e.key===' ') keys.nitro=true; });
window.addEventListener('keyup', e => { if(e.key==='ArrowLeft') keys.left=false; if(e.key==='ArrowRight') keys.right=false; if(e.key==='ArrowUp') keys.accel=false; if(e.key==='ArrowDown') keys.brake=false; if(e.key===' ') keys.nitro=false; });

animate();
</script>
</body>
</html>
