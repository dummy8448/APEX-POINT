<body>

<canvas id="canvas"></canvas>
<div id="immortal-timer">IMMORTAL: 0s</div>

<div class="overlay" id="home-screen">

<div id="hud" class="hidden">
  <div id="hull-card">
    <div class="hull-label">Hull Integrity</div>
    <div id="durability">♥♥♥</div>
  </div>
  <div id="points-card">
    <div class="hud-label">Distance (KM)</div>
    <div id="score-val">0</div>
  </div>
  <div id="nitro-card">
    <div class="hud-label" style="color:#00f2fe">Nitro</div>
    <div id="nitro-bar"><div id="nitro-fill"></div></div>
  </div>
  <div id="speed-card">
    <div id="speed-val">0</div>
    <div style="font-size:14px; color:#00ff88; font-weight:bold">KM/H</div>
  </div>
</div>

<div id="controls" class="hidden">
  <div style="display:flex; gap:15px">
    <div class="ctrl-btn" id="btn-left">◀</div>
    <div class="ctrl-btn" id="btn-right">▶</div>
  </div>
  <div style="display:flex; gap:15px; align-items: flex-end;">
    <div class="ctrl-btn pedal" id="btn-brake" style="background:rgba(255,0,0,0.1)">BRAKE</div>
    <div style="display:flex; flex-direction:column; gap:10px">
        <div class="ctrl-btn" id="btn-nitro" style="height:50px; width:110px; border-radius:25px; font-size:14px; background:rgba(0,242,254,0.2)">NITRO</div>
        <div class="ctrl-btn pedal" id="btn-accel" style="border-color:#00ff88; color:#00ff88">GAS</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let gameState = 'HOME';
let score = 0, speed = 0, nitro = 100, playerX = 0, lives = 3;
let selectedColor = 0x0066ff;
let playerY = 0, playerVY = 0, isJumping = false;
let immortalTime = 0;

// Subway Surfers Style Monster Logic
let activeMonster = null;
let monsterZ = 50; 
let monsterChaseDistance = 0;
let cleanRunDistance = 0; 
let fartLeafTriggered = false;
let smithNerdTriggered = false;

const traffic = [];
const powerups = [];
const keys = {};

const MAX_BASE_SPEED = 2.61; 
const MAX_NITRO_SPEED = 3.04; 

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const ambientLight = new THREE.AmbientLight(0xffffff, 1.3);
scene.add(ambientLight);
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(50, 100, 50);
scene.add(sun);

const AI_COLORS = [0xff3300, 0x00ff00, 0x0066ff, 0xffff00, 0xff00ff, 0xff9900, 0x00ffff, 0x8800ff, 0xeeeeee];

function createCar(color) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 4.8), new THREE.MeshStandardMaterial({color: color, metalness: 0.8, roughness: 0.2}));
    body.position.y = 0.5; group.add(body);
    const cab = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 2.0), new THREE.MeshStandardMaterial({color: 0x111111}));
    cab.position.set(0, 1.1, 0.2); group.add(cab);
    const wGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16); wGeo.rotateZ(Math.PI/2);
    [[-1,0.4,1.5],[1,0.4,1.5],[-1,0.4,-1.5],[1,0.4,-1.5]].forEach(p => {
        const w = new THREE.Mesh(wGeo, new THREE.MeshStandardMaterial({color: 0x111111})); w.position.set(...p); group.add(w);
    });
    return group;
}

function createMonster(name) {
    const group = new THREE.Group();
    const color = name === 'FART LEAF' ? 0x228b22 : 0x000000;
    const body = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 6), new THREE.MeshStandardMaterial({color: color, emissive: color, emissiveIntensity: 0.5}));
    body.position.y = 2; group.add(body);
    
    // Glowing Eyes
    const eyeGeo = new THREE.SphereGeometry(0.4, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({color: 0xff0000});
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.8, 3, -3.1); group.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = 0.8; group.add(eyeR);
    
    group.monsterName = name;
    return group;
}

function createTruck(isRamp = false) {
    const group = new THREE.Group();
    const truckColor = isRamp ? 0xffcc00 : AI_COLORS[Math.floor(Math.random() * AI_COLORS.length)];
    const cab = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.4, 2.5), new THREE.MeshStandardMaterial({color: truckColor}));
    cab.position.set(0, 1.2, -4); group.add(cab);
    if(isRamp) {
        const ramp = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.3, 11), new THREE.MeshStandardMaterial({color: 0x222222}));
        ramp.rotation.x = -0.18; ramp.position.set(0, 0.9, 1); group.add(ramp);
        group.type = 'ramp';
    } else {
        const trailer = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.8, 10), new THREE.MeshStandardMaterial({color: 0xcccccc}));
        trailer.position.set(0, 1.4, 2); group.add(trailer);
        group.type = 'truck';
    }
    return group;
}

function createPowerUp(type) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({
        color: type === 'NITRO' ? 0x00f2fe : (type === 'STAR' ? 0xff00ff : 0xff4444), 
        emissive: type === 'NITRO' ? 0x00f2fe : (type === 'STAR' ? 0xff00ff : 0xff4444),
        emissiveIntensity: 2
    }));
    mesh.type = 'powerup'; mesh.powerType = type; return mesh;
}

let player;
function setCar(color, el) {
    selectedColor = color;
    document.querySelectorAll('.car-opt').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
}

const roadSegments = [];
function createRoad(z) {
    const group = new THREE.Group();
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
    ground.rotation.x = -Math.PI/2; group.add(ground);
    for(let i=0; i<2; i++) {
        const h = 50 + Math.random()*100;
        const b = new THREE.Mesh(new THREE.BoxGeometry(15, h, 15), new THREE.MeshStandardMaterial({color: 0x151515}));
        b.position.set(i%2===0?-35:35, h/2, (Math.random()-0.5)*80); group.add(b);
    }
    group.position.z = z; scene.add(group); return group;
}

function initGame() {
    gameState = 'PLAY';
    score = 0; speed = 0; nitro = 100; lives = 3; playerX = 0; playerY = 0;
    immortalTime = 0;
    fartLeafTriggered = false; smithNerdTriggered = false;
    cleanRunDistance = 0;
    if(activeMonster) { scene.remove(activeMonster); activeMonster = null; }
    
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
    document.getElementById('durability').innerText = '♥♥♥';
    if(player) scene.remove(player);
    player = createCar(selectedColor); scene.add(player);
    traffic.forEach(t => scene.remove(t)); traffic.length = 0;
    powerups.forEach(p => scene.remove(p)); powerups.length = 0;
    roadSegments.forEach(r => scene.remove(r)); roadSegments.length = 0;
    for(let i=0; i<15; i++) roadSegments.push(createRoad(-i * 100));
}

function gameOver() {
    gameState = 'OVER';
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('monster-alert').style.display = 'none';
    document.getElementById('final-score-display').innerText = Math.floor(score);
}

function showHome() {
    gameState = 'HOME';
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('home-screen').classList.remove('hidden');
}

function spawn() {
    if(gameState !== 'PLAY') return;
    const lane = [-9, -3, 3, 9][Math.floor(Math.random()*4)];
    const roll = Math.random();
    if(roll < 0.15) {
        const pType = Math.random() < 0.1 ? 'STAR' : (Math.random() > 0.5 ? 'NITRO' : 'REPAIR');
        const p = createPowerUp(pType);
        p.position.set(lane, 1.5, -800); scene.add(p); powerups.push(p);
    } else {
        const typeRoll = Math.random();
        let t;
        if(typeRoll > 0.85) t = createTruck(true);
        else if(typeRoll > 0.75) t = createTruck(false);
        else t = createCar(AI_COLORS[Math.floor(Math.random() * AI_COLORS.length)]);
        t.position.set(lane, 0, -800); scene.add(t); traffic.push(t);
    }
}
setInterval(spawn, 600);

function update() {
    if(gameState !== 'PLAY') return;

    if (score >= 4500 && !fartLeafTriggered) {
        fartLeafTriggered = true;
        activeMonster = createMonster('FART LEAF');
        monsterZ = 40; 
        monsterChaseDistance = 0;
        cleanRunDistance = 0;
        scene.add(activeMonster);
        showAlert("FART LEAF IS CHASING!");
    }
    if (score >= 7500 && !smithNerdTriggered) {
        smithNerdTriggered = true;
        if(activeMonster) scene.remove(activeMonster);
        activeMonster = createMonster('SMITH NERD');
        monsterZ = 40; 
        monsterChaseDistance = 0;
        cleanRunDistance = 0;
        scene.add(activeMonster);
        showAlert("SMITH NERD IS CHASING!");
    }

    if (activeMonster) {
        const currentDist = speed * 0.11;
        monsterChaseDistance += currentDist;
        
        if (cleanRunDistance > 200) {
            monsterZ += 0.5; 
        } else {
            monsterZ = Math.max(10, monsterZ - 0.05);
        }

        activeMonster.position.z = player.position.z + monsterZ;
        activeMonster.position.x += (player.position.x - activeMonster.position.x) * 0.1;
        
        cleanRunDistance += currentDist;

        if (monsterZ < 12 && Math.abs(activeMonster.position.x - player.position.x) < 2) {
             if (immortalTime <= 0) gameOver();
        }

        const limit = activeMonster.monsterName === 'FART LEAF' ? 2000 : 5000;
        if (monsterChaseDistance > limit && monsterZ > 60) {
            scene.remove(activeMonster);
            activeMonster = null;
        }
    }

    if (immortalTime > 0) {
        immortalTime -= 1/60;
        document.getElementById('immortal-timer').style.display = 'block';
        document.getElementById('immortal-timer').innerText = `IMMORTAL: ${Math.ceil(immortalTime)}s`;
        player.children[0].material.emissive = new THREE.Color(0xff00ff);
        player.children[0].material.emissiveIntensity = 0.5;
    } else {
        document.getElementById('immortal-timer').style.display = 'none';
        player.children[0].material.emissive = new THREE.Color(0x000000);
    }

    if(keys['left']) playerX -= 0.65; if(keys['right']) playerX += 0.65;
    playerX = Math.max(-12, Math.min(12, playerX));
    player.position.x += (playerX - player.position.x) * 0.25;
    player.rotation.z = (playerX - player.position.x) * -0.2;

    const isNitro = keys['nitro'] && nitro > 1;
    let target = keys['accel'] ? MAX_BASE_SPEED : 0.8;
    if(keys['brake']) target = 0.1;
    if(isNitro) { target = MAX_NITRO_SPEED; nitro -= 0.9; } else if(nitro < 100) nitro += 0.15;
    
    speed += (target - speed) * 0.05;
    score += speed * 0.11; 

    if(isJumping) {
        playerVY -= 0.02; playerY += playerVY;
        if(playerY <= 0) { playerY = 0; playerVY = 0; isJumping = false; }
    }
    player.position.y = playerY;

    roadSegments.forEach(r => {
        r.position.z += speed;
        if(r.position.z > 100) r.position.z -= 1500;
    });

    for(let i=traffic.length-1; i>=0; i--) {
        const t = traffic[i]; t.position.z += speed - 1.5;
        const dx = Math.abs(t.position.x - player.position.x);
        const dz = t.position.z - player.position.z;

        if(t.type === 'ramp' && dx < 2.0 && dz > -10 && dz < -4 && !isJumping) {
            isJumping = true; playerVY = 0.5 + (speed * 0.04); playerX = t.position.x;
        } else if(dx < 2.2 && Math.abs(dz) < 4.5 && Math.abs(playerY - t.position.y) < 1.0) {
            if (immortalTime <= 0) {
                if (activeMonster) {
                    monsterZ = 11; 
                    cleanRunDistance = 0; 
                }
                lives--; speed *= 0.1; scene.remove(t); traffic.splice(i,1);
                document.getElementById('durability').innerText = '♥'.repeat(lives);
                if(lives <= 0) gameOver();
            } else { t.position.y += 5; t.position.z -= 10; }
            continue;
        }
        if(t.position.z > 50) { scene.remove(t); traffic.splice(i,1); }
    }

    for(let i=powerups.length-1; i>=0; i--) {
        const p = powerups[i]; p.position.z += speed; p.rotation.y += 0.05;
        if(Math.abs(p.position.x - player.position.x) < 2.5 && Math.abs(p.position.z - player.position.z) < 3) {
            if(p.powerType === 'NITRO') nitro = Math.min(100, nitro + 40);
            else if(p.powerType === 'REPAIR') lives = Math.min(3, lives + 1);
            else if(p.powerType === 'STAR') { immortalTime += 5; } 
            document.getElementById('durability').innerText = '♥'.repeat(lives);
            scene.remove(p); powerups.splice(i, 1); continue;
        }
        if(p.position.z > 50) { scene.remove(p); powerups.splice(i,1); }
    }

    camera.fov = 60 + (speed * 12);
    camera.updateProjectionMatrix();
    const camZ = 15 + (speed * 1.5);
    camera.position.lerp(new THREE.Vector3(player.position.x * 0.5, 6 + (playerY * 0.5), camZ), 0.1);
    camera.lookAt(player.position.x, 1 + playerY, -100);

    document.getElementById('speed-val').innerText = Math.floor(speed * 115);
    document.getElementById('score-val').innerText = Math.floor(score);
    document.getElementById('nitro-fill').style.width = nitro + '%';
}

function showAlert(txt) {
    const el = document.getElementById('monster-alert');
    el.innerText = txt; el.style.display = 'block';
    setTimeout(() => { if(gameState === 'PLAY') el.style.display = 'none'; }, 3000);
}

const bind = (id, k) => {
    const el = document.getElementById(id);
    el.onmousedown = el.ontouchstart = e => { e.preventDefault(); keys[k] = true; };
    el.onmouseup = el.onmouseleave = el.ontouchend = e => { e.preventDefault(); keys[k] = false; };
};
bind('btn-left', 'left'); bind('btn-right', 'right');
bind('btn-accel', 'accel'); bind('btn-brake', 'brake');
bind('btn-nitro', 'nitro');

function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
animate();
window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
</script>
</body>
</html>
