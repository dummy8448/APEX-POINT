        <div class="ctrl-btn" id="btn-nitro" style="height:50px; width:110px; border-radius:25px; font-size:14px; background:rgba(0,242,254,0.2)">NITRO</div>
        <div class="ctrl-btn pedal" id="btn-accel" style="border-color:#00ff88; color:#00ff88">GAS</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let gameState = 'HOME';
let score = 0, speed = 0, nitro = 100, playerX = 0, lives = 3;
let selectedColor = 0x0066ff;
let playerY = 0, playerVY = 0, isJumping = false;
let immortalTime = 0;
let mileStoneReached = false;
let isDay = true;
let currentMonster = null;

const traffic = [];
const powerups = [];
const keys = {};

const MAX_BASE_SPEED = 2.61; 
const MAX_NITRO_SPEED = 3.04; 

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const ambientLight = new THREE.AmbientLight(0xffffff, 1.3);
scene.add(ambientLight);
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(50, 100, 50);
scene.add(sun);

const AI_COLORS = [0xff3300, 0x00ff00, 0x0066ff, 0xffff00, 0xff00ff, 0xff9900, 0x00ffff, 0x8800ff, 0xeeeeee];

function createCar(color) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 4.8), new THREE.MeshStandardMaterial({color: color, metalness: 0.8, roughness: 0.2}));
    body.position.y = 0.5; group.add(body);
    const cab = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 2.0), new THREE.MeshStandardMaterial({color: 0x111111}));
    cab.position.set(0, 1.1, 0.2); group.add(cab);
    const wGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16); wGeo.rotateZ(Math.PI/2);
    [[-1,0.4,1.5],[1,0.4,1.5],[-1,0.4,-1.5],[1,0.4,-1.5]].forEach(p => {
        const w = new THREE.Mesh(wGeo, new THREE.MeshStandardMaterial({color: 0x111111})); w.position.set(...p); group.add(w);
    });
    return group;
}

function createTruck(isRamp = false) {
    const group = new THREE.Group();
    // Industrial colors for trucks
    const truckColor = isRamp ? 0xffcc00 : 0x2c3e50;
    const bodyColor = isRamp ? 0x222222 : 0x95a5a6;
    
    const cab = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.4, 2.5), new THREE.MeshStandardMaterial({color: truckColor}));
    cab.position.set(0, 1.2, -4); group.add(cab);
    
    if(isRamp) {
        const ramp = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.3, 11), new THREE.MeshStandardMaterial({color: 0x222222}));
        ramp.rotation.x = -0.18; ramp.position.set(0, 0.9, 1); group.add(ramp);
        const railL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 11), new THREE.MeshStandardMaterial({color: 0xffff00}));
        railL.position.set(-1.4, 1.2, 1); railL.rotation.x = -0.18; group.add(railL);
        const railR = railL.clone(); railR.position.x = 1.4; group.add(railR);
        group.type = 'ramp';
    } else {
        const trailer = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.8, 10), new THREE.MeshStandardMaterial({color: bodyColor}));
        trailer.position.set(0, 1.4, 2); group.add(trailer);
        group.type = 'truck';
    }
    return group;
}

function createMonster(type) {
    const group = new THREE.Group();
    if(type === 'FART_LEAF') {
        const body = new THREE.Mesh(new THREE.SphereGeometry(6, 12, 12), new THREE.MeshStandardMaterial({color: 0x2ecc71, wireframe: true}));
        group.add(body);
        const core = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshStandardMaterial({color: 0x27ae60, emissive: 0x2ecc71}));
        group.add(core);
        group.name = "FART LEAF MONSTER";
    } else {
        const body = new THREE.Mesh(new THREE.TorusKnotGeometry(4, 1.2, 100, 16), new THREE.MeshStandardMaterial({color: 0x34495e, emissive: 0x000000}));
        group.add(body);
        const head = new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshStandardMaterial({color: 0xe74c3c}));
        head.position.y = 5; group.add(head);
        group.name = "SMITH MONSTER";
    }
    group.position.set(0, 15, -100);
    scene.add(group);
    return group;
}

function createPowerUp(type) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({
        color: type === 'NITRO' ? 0x00f2fe : (type === 'STAR' ? 0xff00ff : 0xff4444), 
        emissive: type === 'NITRO' ? 0x00f2fe : (type === 'STAR' ? 0xff00ff : 0xff4444),
        emissiveIntensity: 2
    }));
    mesh.type = 'powerup'; mesh.powerType = type; return mesh;
}

let player;
function setCar(color, el) {
    selectedColor = color;
    document.querySelectorAll('.car-opt').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
}

const roadSegments = [];
function createRoad(z) {
    const group = new THREE.Group();
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
    ground.rotation.x = -Math.PI/2; group.add(ground);
    for(let i=0; i<4; i++) {
        const h = 50 + Math.random()*200;
        const b = new THREE.Mesh(new THREE.BoxGeometry(20, h, 20), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
        b.position.set(i%2===0?-40:40, h/2, (Math.random()-0.5)*80); group.add(b);
    }
    group.position.z = z; scene.add(group); return group;
}

function initGame() {
    gameState = 'PLAY';
    score = 0; speed = 0; nitro = 100; lives = 3; playerX = 0; playerY = 0;
    immortalTime = 0; mileStoneReached = false; isDay = true;
    if(currentMonster) { scene.remove(currentMonster); currentMonster = null; }
    
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
    document.getElementById('durability').innerText = '♥♥♥';
    
    if(player) scene.remove(player);
    player = createCar(selectedColor); scene.add(player);
    
    traffic.forEach(t => scene.remove(t)); traffic.length = 0;
    powerups.forEach(p => scene.remove(p)); powerups.length = 0;
    roadSegments.forEach(r => scene.remove(r)); roadSegments.length = 0;
    for(let i=0; i<15; i++) roadSegments.push(createRoad(-i * 100));
}

function gameOver() {
    gameState = 'OVER';
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('final-score-display').innerText = Math.floor(score);
    if(currentMonster) { scene.remove(currentMonster); currentMonster = null; }
}

function showHome() {
    gameState = 'HOME';
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('home-screen').classList.remove('hidden');
}

function spawn() {
    if(gameState !== 'PLAY') return;
    const lane = [-9, -3, 3, 9][Math.floor(Math.random()*4)];
    const roll = Math.random();
    if(roll < 0.25) {
        const pType = Math.random() < 0.15 ? 'STAR' : (Math.random() > 0.4 ? 'NITRO' : 'REPAIR');
        const p = createPowerUp(pType);
        p.position.set(lane, 1.5, -800); scene.add(p); powerups.push(p);
    } else {
        const typeRoll = Math.random();
        let t;
        if(typeRoll > 0.8) t = createTruck(true);
        else if(typeRoll > 0.6) t = createTruck(false);
        else t = createCar(AI_COLORS[Math.floor(Math.random()*AI_COLORS.length)]);
        t.position.set(lane, 0, -800); scene.add(t); traffic.push(t);
    }
}
setInterval(spawn, 550);

function update() {
    if(gameState !== 'PLAY') return;

    // Monster Logic
    const warning = document.getElementById('monster-warning');
    if(Math.floor(score) === 5000 && !currentMonster) {
        currentMonster = createMonster('FART_LEAF');
        warning.style.display = 'block';
        warning.innerText = "FART LEAF MONSTER AWAKENED";
        setTimeout(() => warning.style.display = 'none', 3000);
    }
    if(Math.floor(score) === 7500 && currentMonster?.name !== "SMITH MONSTER") {
        if(currentMonster) scene.remove(currentMonster);
        currentMonster = createMonster('SMITH');
        warning.style.display = 'block';
        warning.innerText = "SMITH MONSTER AWAKENED";
        setTimeout(() => warning.style.display = 'none', 3000);
    }

    if(currentMonster) {
        currentMonster.position.z = -150 + Math.sin(Date.now() * 0.001) * 20;
        currentMonster.position.x = player.position.x;
        currentMonster.rotation.y += 0.02;
        currentMonster.rotation.x += 0.01;
        // Monster attacks (visual shake)
        if(Math.random() < 0.05) speed *= 0.99;
    }

    let cycle = Math.floor(score / 250) % 2 === 0;
    if (cycle !== isDay) {
        isDay = cycle;
        if (isDay) {
            sun.intensity = 1.5; ambientLight.intensity = 1.3;
            scene.background = new THREE.Color(0x87ceeb);
        } else {
            sun.intensity = 1.1; ambientLight.intensity = 1.1;
            scene.background = new THREE.Color(0x20153a); 
        }
    }

    if (immortalTime > 0) {
        immortalTime -= 1/60;
        document.getElementById('immortal-timer').style.display = 'block';
        document.getElementById('immortal-timer').innerText = `IMMORTAL: ${Math.ceil(immortalTime)}s`;
        player.children[0].material.emissive = new THREE.Color(0xff00ff);
        player.children[0].material.emissiveIntensity = Math.sin(Date.now() * 0.01) * 0.5 + 0.5;
    } else {
        document.getElementById('immortal-timer').style.display = 'none';
        player.children[0].material.emissive = new THREE.Color(0x000000);
    }

    if(keys['left']) playerX -= 0.65; if(keys['right']) playerX += 0.65;
    playerX = Math.max(-12, Math.min(12, playerX));
    player.position.x += (playerX - player.position.x) * 0.25;
    player.rotation.z = (playerX - player.position.x) * -0.2;

    const isNitro = keys['nitro'] && nitro > 1;
    let target = keys['accel'] ? MAX_BASE_SPEED : 0.8;
    if(keys['brake']) target = 0.1;
    if(isNitro) { target = MAX_NITRO_SPEED; nitro -= 0.9; } else if(nitro < 100) nitro += 0.15;
    
    speed += (target - speed) * 0.05;
    score += speed * 0.07; 

    if(isJumping) {
        playerVY -= 0.02; playerY += playerVY;
        if(playerY <= 0) { playerY = 0; playerVY = 0; isJumping = false; }
    }
    player.position.y = playerY;

    roadSegments.forEach(r => {
        r.position.z += speed;
        if(r.position.z > 100) r.position.z -= 1500;
    });

    for(let i=traffic.length-1; i>=0; i--) {
        const t = traffic[i]; t.position.z += speed - 1.5;
        const dx = Math.abs(t.position.x - player.position.x);
        const dz = t.position.z - player.position.z;
        
        if(t.type === 'ramp' && dx < 2.0 && dz > -10 && dz < -4 && !isJumping) {
            isJumping = true; playerVY = 0.5 + (speed * 0.04); playerX = t.position.x;
        } else if(dx < 2.2 && Math.abs(dz) < 4.5 && Math.abs(playerY - t.position.y) < 1.0) {
            if (immortalTime <= 0) {
                lives--; speed *= 0.2; scene.remove(t); traffic.splice(i,1);
                document.getElementById('durability').innerText = '♥'.repeat(lives);
                if(lives <= 0) gameOver();
            } else { t.position.y += 2; t.position.z -= 5; }
            continue;
        }
        if(t.position.z > 50) { scene.remove(t); traffic.splice(i,1); }
    }

    for(let i=powerups.length-1; i>=0; i--) {
        const p = powerups[i]; p.position.z += speed; p.rotation.y += 0.05;
        if(Math
