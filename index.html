<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: #87ceeb;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
    user-select: none;
  }

  #canvas { display: block; width: 100vw; height: 100vh; }

  /* UI Styling based on Screenshots */
  #hud {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    padding: 30px;
  }

  /* Points Pill (Center Top) */
  #points-card {
    position: absolute;
    top: 25px; left: 50%;
    transform: translateX(-50%);
    background: rgba(40, 40, 40, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    padding: 8px 35px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
  }
  #points-label { font-size: 10px; letter-spacing: 2px; color: #00ff88; font-weight: 700; margin-bottom: -4px; }
  #score-val { font-family: 'Orbitron'; font-size: 38px; font-weight: 900; }

  /* Hull Card (Top Left) */
  #hull-card {
    position: absolute;
    top: 25px; left: 25px;
    background: rgba(40, 40, 40, 0.7);
    backdrop-filter: blur(10px);
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .card-label { font-size: 9px; letter-spacing: 1.5px; opacity: 0.7; margin-bottom: 4px; font-weight: 700; }
  #durability { font-size: 22px; color: #ff4444; letter-spacing: 4px; }

  /* Nitro Card (Bottom Left) */
  #nitro-card {
    position: absolute;
    bottom: 250px; left: 25px;
    background: rgba(20, 20, 20, 0.6);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    width: 220px;
  }
  #nitro-bar-container {
    width: 100%; height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
  }
  #nitro-fill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #00f2fe, #4facfe);
    box-shadow: 0 0 15px #00f2fe;
  }

  /* Speedometer (Bottom Right) */
  #speed-card {
    position: absolute;
    bottom: 240px; right: 25px;
    background: rgba(20, 20, 20, 0.7);
    backdrop-filter: blur(10px);
    padding: 15px 30px;
    border-radius: 15px;
    text-align: right;
  }
  #speed-val { font-family: 'Orbitron'; font-size: 72px; font-weight: 900; font-style: italic; line-height: 0.9; }
  .speed-unit { font-size: 14px; color: #00ff88; font-weight: 900; margin-top: 5px; }

  /* Map (Top Right) */
  #mini-map {
    position: absolute;
    top: 25px; right: 25px;
    width: 70px; height: 180px;
    background: rgba(0, 0, 0, 0.5);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
  }
  #map-player {
    position: absolute;
    width: 8px; height: 12px;
    background: #00ff88;
    left: 50%; bottom: 15px;
    transform: translateX(-50%);
    box-shadow: 0 0 10px #00ff88;
    z-index: 5;
  }

  /* Menu Screens */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; background: #0a0a0a;
  }
  .hidden { display: none !important; }

  .game-title {
    font-family: 'Orbitron'; font-size: 72px; font-weight: 900;
    background: linear-gradient(#fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 40px;
  }

  .btn {
    pointer-events: all; cursor: pointer;
    background: #00ff88; color: #000;
    font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900;
    padding: 20px 60px; border: none; border-radius: 50px;
    margin-bottom: 15px; transition: 0.2s;
  }

  /* Touch Controls (Screenshot Style) */
  #touch-controls {
    position: fixed; bottom: 40px; left: 0; right: 0;
    height: 180px; pointer-events: none; z-index: 20;
    padding: 0 40px;
  }
  .t-btn {
    pointer-events: all; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center; color: white;
    backdrop-filter: blur(10px);
  }
  .circle { width: 100px; height: 100px; border-radius: 50%; font-size: 32px; }
  .pedal { width: 110px; height: 160px; border-radius: 15px; font-weight: 900; font-size: 16px; }
  
  #steer-zone { position: absolute; left: 40px; bottom: 0; display: flex; gap: 20px; }
  #action-zone { position: absolute; right: 40px; bottom: 0; display: flex; align-items: flex-end; gap: 15px; }

  #damage-flash { position: fixed; inset: 0; background: red; opacity: 0; pointer-events: none; z-index: 1000; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="damage-flash"></div>

<div id="hud" class="hidden">
  <div id="hull-card">
    <div class="card-label">CHASSIS</div>
    <div id="durability">♥♥♥</div>
  </div>

  <div id="points-card">
    <div id="points-label">POINTS</div>
    <div id="score-val">0</div>
  </div>

  <div id="mini-map"><div id="map-player"></div></div>

  <div id="nitro-card">
    <div class="card-label">NITRO</div>
    <div id="nitro-bar-container"><div id="nitro-fill"></div></div>
  </div>

  <div id="speed-card">
    <div id="speed-val">0</div>
    <div class="speed-unit">KM/H</div>
  </div>
</div>

<div class="screen" id="start-screen">
  <div class="game-title">APEX POINT</div>
  <button class="btn" onclick="startGame()">START RUN</button>
  <p style="font-size:12px; letter-spacing:4px; opacity:0.5">DUMB BRAINEZ PRODUCTIONS</p>
</div>

<div class="screen hidden" id="gameover-screen">
  <div class="game-title" style="color:#ff4444">CRASHED</div>
  <h2 id="final-score" style="font-size: 80px; margin-bottom: 30px;">0</h2>
  <button class="btn" onclick="startGame()">RETRY</button>
</div>

<div id="touch-controls">
  <div id="steer-zone">
    <div class="t-btn circle" id="btn-left">◀</div>
    <div class="t-btn circle" id="btn-right">▶</div>
  </div>
  <div id="action-zone">
    <div class="t-btn pedal" id="btn-brake" style="height:120px">BRAKE</div>
    <div style="display:flex; flex-direction:column; gap:15px">
        <div class="t-btn" id="btn-nitro" style="height:45px; width:110px; border-radius:20px; font-size:12px; font-weight:900">NITRO</div>
        <div class="t-btn pedal" id="btn-accel" style="border-color:#00ff88; color:#00ff88">GAS</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let gameState = 'START';
let score = 0, speed = 0, nitro = 100, playerX = 0, lives = 3;
const traffic = [];
const keys = {};

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

// Lighting for "Screenshot" Look
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(50, 100, 50);
scene.add(sun);

function createCar(color) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 4.8), new THREE.MeshStandardMaterial({color: color, metalness: 0.7, roughness: 0.2}));
    body.position.y = 0.5;
    group.add(body);

    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.6, 2.0), new THREE.MeshStandardMaterial({color: 0x111111}));
    cabin.position.set(0, 1.1, 0.3);
    group.add(cabin);

    // Wheels
    const wGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16);
    wGeo.rotateZ(Math.PI/2);
    const wMat = new THREE.MeshStandardMaterial({color: 0x111111});
    [[-1,0.4,1.5],[1,0.4,1.5],[-1,0.4,-1.5],[1,0.4,-1.5]].forEach(p => {
        const w = new THREE.Mesh(wGeo, wMat); w.position.set(...p); group.add(w);
    });

    return group;
}

let player = createCar(0x0066ff);
scene.add(player);

const segments = [];
function createSegment(z) {
    const group = new THREE.Group();
    const road = new THREE.Mesh(new THREE.PlaneGeometry(28, 100), new THREE.MeshStandardMaterial({color: 0x222222}));
    road.rotation.x = -Math.PI/2;
    group.add(road);

    const grass = new THREE.Mesh(new THREE.PlaneGeometry(1000, 100), new THREE.MeshStandardMaterial({color: 0x55ff55}));
    grass.rotation.x = -Math.PI/2; grass.position.y = -0.1;
    group.add(grass);

    // Buildings
    for(let i=0; i<6; i++) {
        const h = 40 + Math.random()*80;
        const b = new THREE.Mesh(new THREE.BoxGeometry(20, h, 20), new THREE.MeshStandardMaterial({color: 0x777777}));
        b.position.set(i % 2 === 0 ? -40 - Math.random()*20 : 40 + Math.random()*20, h/2, (Math.random()-0.5)*100);
        group.add(b);
    }

    group.position.z = z;
    scene.add(group);
    return group;
}

function startGame() {
    gameState = 'PLAY';
    score = 0; speed = 0; nitro = 100; playerX = 0; lives = 3;
    traffic.forEach(t => { if(t.dot) t.dot.remove(); scene.remove(t); });
    traffic.length = 0;
    segments.forEach(s => scene.remove(s));
    segments.length = 0;
    for(let i=0; i<15; i++) segments.push(createSegment(-i * 100));
    
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    updateHUD();
}

function updateHUD() {
    document.getElementById('durability').innerText = '♥'.repeat(lives);
}

function spawnTraffic() {
    if (gameState !== 'PLAY') return;
    const lanes = [-9, -3, 3, 9];
    const lane = lanes[Math.floor(Math.random() * lanes.length)];
    const t = createCar(0x333333);
    t.position.set(lane, 0, -800);
    
    const dot = document.createElement('div');
    dot.style.cssText = "position:absolute; width:6px; height:6px; background:#ff4444; border-radius:50%; left:50%; transform:translateX(-50%);";
    document.getElementById('mini-map').appendChild(dot);
    t.dot = dot;
    
    scene.add(t);
    traffic.push(t);
}
setInterval(spawnTraffic, 500);

function update() {
    if (gameState !== 'PLAY') return;

    if (keys['left']) playerX -= 0.4;
    if (keys['right']) playerX += 0.4;
    playerX = Math.max(-11, Math.min(11, playerX));
    player.position.x += (playerX - player.position.x) * 0.2;
    player.rotation.z = (playerX - player.position.x) * -0.15;

    const isNitro = keys['nitro'] && nitro > 1;
    let target = keys['accel'] ? 2.8 : 0.8;
    if (keys['brake']) target = 0.2;
    if (isNitro) { target = 3.6; nitro -= 0.7; } else if (nitro < 100) nitro += 0.2;
    
    speed += (target - speed) * 0.05;
    score += speed * 0.1;

    segments.forEach(seg => {
        seg.position.z += speed;
        if(seg.position.z > 100) seg.position.z -= 1500;
    });

    for(let i=traffic.length-1; i>=0; i--) {
        const t = traffic[i];
        t.position.z += speed - 1.0;
        t.dot.style.bottom = (180 - (Math.abs(t.position.z) * 0.22)) + 'px';
        t.dot.style.left = `calc(50% + ${t.position.x * 2.5}px)`;

        if (Math.abs(t.position.x - player.position.x) < 2.2 && Math.abs(t.position.z - player.position.z) < 4.5) {
            document.getElementById('damage-flash').style.opacity = '0.5';
            setTimeout(() => document.getElementById('damage-flash').style.opacity = '0', 100);
            lives--; updateHUD();
            t.dot.remove(); scene.remove(t); traffic.splice(i, 1);
            speed *= 0.2;
            if (lives <= 0) {
                gameState = 'GAMEOVER';
                document.getElementById('gameover-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = Math.floor(score);
            }
            continue;
        }
        if(t.position.z > 50) { t.dot.remove(); scene.remove(t); traffic.splice(i, 1); }
    }

    camera.position.set(player.position.x * 0.3, 5 + (speed * 0.1), 12 + (speed * 1.5));
    camera.lookAt(player.position.x, 1, -100);

    document.getElementById('speed-val').innerText = Math.floor(speed * 105);
    document.getElementById('score-val').innerText = Math.floor(score);
    document.getElementById('nitro-fill').style.width = nitro + '%';
    document.getElementById('map-player').style.left = `calc(50% + ${player.position.x * 2.5}px)`;
}

// Touch Handling
const bind = (id, k) => {
    const el = document.getElementById(id);
    el.ontouchstart = e => { e.preventDefault(); keys[k] = true; };
    el.ontouchend = e => { e.preventDefault(); keys[k] = false; };
};
bind('btn-left', 'left'); bind('btn-right', 'right');
bind('btn-accel', 'accel'); bind('btn-brake', 'brake');
bind('btn-nitro', 'nitro');

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}
animate();

window.onresize = () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
