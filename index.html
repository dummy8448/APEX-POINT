<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APEX POINT: BRIGHT EDITION</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'Rajdhani', sans-serif; color: #fff; user-select: none; }
  #canvas { display: block; width: 100vw; height: 100vh; }

  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
  }
  .hidden { display: none !important; }

  .game-title {
    font-family: 'Orbitron'; font-size: clamp(40px, 10vw, 80px); font-weight: 900;
    background: linear-gradient(#fff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 5px; text-transform: uppercase; letter-spacing: 5px;
  }
  
  .btn {
    pointer-events: all; cursor: pointer; background: #00ff88; color: #000;
    font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900;
    padding: 15px 60px; border: none; border-radius: 50px; margin: 10px;
    transition: 0.2s; box-shadow: 0 10px 20px rgba(0,255,136,0.3);
  }

  /* Special Thanks Bar */
  .thanks-bar {
    position: absolute; bottom: 20px; width: 100%; text-align: center;
    background: rgba(0,255,136,0.1); padding: 10px; border-top: 1px solid #00ff88;
  }
  .thanks-text { font-family: 'Orbitron'; font-size: 12px; color: #00ff88; letter-spacing: 2px; }

  /* HUD */
  #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; }
  #score-card { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px 30px; border-radius: 15px; border: 1px solid #00ff88; text-align: center; }
  #speed-card { position: absolute; bottom: 220px; right: 20px; text-align: right; }
  #speed-val { font-family: 'Orbitron'; font-size: 60px; font-weight: 900; color: #fff; }

  /* Controls */
  #controls { position: fixed; bottom: 30px; width: 100%; padding: 0 30px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
  .ctrl-btn { pointer-events: all; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid #fff; color: white; display: flex; align-items: center; justify-content: center; font-size: 25px; backdrop-filter: blur(5px); }
  .pedal { width: 90px; height: 140px; border-radius: 15px; font-weight: 900; }
  #immortal-tag { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); color: #ff00ff; font-family: 'Orbitron'; font-weight: 900; display: none; text-shadow: 0 0 10px #ff00ff; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="immortal-tag">IMMORTAL ACTIVE</div>

<div class="overlay" id="home-screen">
  <div class="game-title">Apex Point</div>
  <p style="color:#888; letter-spacing:5px; margin-bottom:30px">ULTRA DETAILED</p>
  <button class="btn" onclick="initGame()">START ENGINE</button>
  <div class="thanks-bar">
    <div class="thanks-text">SPECIAL THANKS TO: ASHMITH, DEV, AND EDWIN</div>
  </div>
</div>

<div class="overlay hidden" id="game-over">
  <h1 style="color:#ff4444; font-family:Orbitron; font-size:40px">CRASHED</h1>
  <div id="final-score" style="font-size:50px; margin:20px">0</div>
  <button class="btn" onclick="initGame()">TRY AGAIN</button>
</div>

<div id="hud" class="hidden">
  <div id="score-card">
    <div style="font-size:10px; color:#00ff88">POINTS</div>
    <div id="score-val" style="font-family:Orbitron; font-size:30px">0</div>
  </div>
  <div id="speed-card">
    <div id="speed-val">0</div>
    <div style="font-size:12px; font-weight:bold; color:#00ff88">KM/H</div>
  </div>
</div>

<div id="controls" class="hidden">
  <div style="display:flex; gap:10px">
    <div class="ctrl-btn" id="btn-l">◀</div>
    <div class="ctrl-btn" id="btn-r">▶</div>
  </div>
  <div style="display:flex; gap:10px; align-items: flex-end;">
    <div class="ctrl-btn pedal" id="btn-b" style="background:rgba(255,0,0,0.2)">BRAKE</div>
    <div class="ctrl-btn pedal" id="btn-a" style="border-color:#00ff88; color:#00ff88">GAS</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer, player, clock;
let score = 0, speed = 0, playerX = 0, immortalTimer = 0;
let gameState = 'HOME';
let roadSegments = [], traffic = [], powerups = [];
const keys = {};

const MAX_ACCEL = 2.6; // ~300kmh
const MAX_NITRO = 3.05; // ~350kmh
const AI_COLORS = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff, 0xffa500, 0xffffff];

function initScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Bright Sky
    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Sun Bright Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(50, 100, 50);
    scene.add(sun);
}

function createDetailedCar(color) {
    const group = new THREE.Group();
    // Body with more detail
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 4.8), new THREE.MeshStandardMaterial({color: color, metalness: 0.6}));
    body.position.y = 0.6; group.add(body);
    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.6, 2.5), new THREE.MeshStandardMaterial({color: 0x111111}));
    roof.position.set(0, 1.2, 0.2); group.add(roof);
    // Headlights
    const lightGeo = new THREE.BoxGeometry(0.5, 0.2, 0.1);
    const headL = new THREE.Mesh(lightGeo, new THREE.MeshBasicMaterial({color: 0xffffff}));
    headL.position.set(0.7, 0.7, -2.4); group.add(headL);
    const headR = headL.clone(); headR.position.x = -0.7; group.add(headR);
    return group;
}

function createBuilding(x, z) {
    const h = 40 + Math.random() * 60;
    const b = new THREE.Mesh(
        new THREE.BoxGeometry(15, h, 15), 
        new THREE.MeshStandardMaterial({color: 0x333333, roughness: 0.1})
    );
    // Window details
    const winGeo = new THREE.PlaneGeometry(1, 1);
    const winMat = new THREE.MeshBasicMaterial({color: 0xffffcc});
    for(let i=0; i<5; i++) {
        const w = new THREE.Mesh(winGeo, winMat);
        w.position.set(7.51, (i*8) + 10, (Math.random()-0.5)*10);
        w.rotation.y = Math.PI/2;
        b.add(w);
    }
    b.position.set(x, h/2, z);
    return b;
}

function initGame() {
    gameState = 'PLAY';
    score = 0; speed = 0; playerX = 0; immortalTimer = 0;
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('game-over').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');

    while(scene.children.length > 0) scene.remove(scene.children[0]);
    initScene();

    player = createDetailedCar(0x00ff88);
    scene.add(player);

    roadSegments = [];
    for(let i=0; i<10; i++) {
        const road = new THREE.Group();
        const asphalt = new THREE.Mesh(new THREE.PlaneGeometry(30, 100), new THREE.MeshStandardMaterial({color: 0x222222}));
        asphalt.rotation.x = -Math.PI/2;
        road.add(asphalt);
        road.add(createBuilding(-30, 0));
        road.add(createBuilding(30, 0));
        road.position.z = -i * 100;
        scene.add(road);
        roadSegments.push(road);
    }
    traffic = []; powerups = [];
}

function spawnTraffic() {
    if(gameState !== 'PLAY') return;
    const lane = [-9, -3, 3, 9][Math.floor(Math.random()*4)];
    const roll = Math.random();
    
    if(roll < 0.1) { // Powerup
        const p = new THREE.Mesh(new THREE.IcosahedronGeometry(1), new THREE.MeshStandardMaterial({color: 0xff00ff, emissive: 0xff00ff}));
        p.position.set(lane, 1.5, -500);
        p.isStar = true;
        scene.add(p); powerups.push(p);
    } else { // AI Car
        const t = createDetailedCar(AI_COLORS[Math.floor(Math.random()*AI_COLORS.length)]);
        t.position.set(lane, 0, -500);
        scene.add(t); traffic.push(t);
    }
}
setInterval(spawnTraffic, 600);

function update() {
    if(gameState !== 'PLAY') return;

    // Movement logic
    if(keys.l) playerX -= 0.6; if(keys.r) playerX += 0.6;
    playerX = Math.max(-12, Math.min(12, playerX));
    player.position.x += (playerX - player.position.x) * 0.2;
    player.rotation.z = (playerX - player.position.x) * -0.15;

    let targetSpeed = keys.a ? MAX_ACCEL : 0.5;
    if(keys.b) targetSpeed = 0.1;
    speed += (targetSpeed - speed) * 0.03;

    // Points logic
    let pointRate = (speed > 1.5) ? 2.5 : 1; 
    score += pointRate;
    if(Math.floor(score) % 1200 === 0 && score > 0) immortalTimer = 300; // Super Star logic

    // World movement
    roadSegments.forEach(r => {
        r.position.z += speed * 20;
        if(r.position.z > 100) r.position.z -= 1000;
    });

    traffic.forEach((t, i) => {
        t.position.z += speed * 20 - 1;
        if(Math.abs(t.position.x - player.position.x) < 2 && Math.abs(t.position.z - player.position.z) < 4) {
            if(immortalTimer <= 0) {
                gameState = 'OVER';
                document.getElementById('game-over').classList.remove('hidden');
                document.getElementById('final-score').innerText = Math.floor(score);
            } else {
                scene.remove(t); traffic.splice(i, 1);
            }
        }
        if(t.position.z > 50) { scene.remove(t); traffic.splice(i, 1); }
    });

    powerups.forEach((p, i) => {
        p.position.z += speed * 20;
        if(Math.abs(p.position.x - player.position.x) < 2 && Math.abs(p.position.z - player.position.z) < 3) {
            immortalTimer = 300; // 5 seconds @ 60fps
            scene.remove(p); powerups.splice(i, 1);
        }
    });

    if(immortalTimer > 0) {
        immortalTimer--;
        document.getElementById('immortal-tag').style.display = 'block';
        player.children[0].material.emissive = new THREE.Color(0xff00ff);
    } else {
        document.getElementById('immortal-tag').style.display = 'none';
        player.children[0].material.emissive = new THREE.Color(0x000000);
    }

    // UI
    document.getElementById('speed-val').innerText = Math.floor(speed * 115);
    document.getElementById('score-val').innerText = Math.floor(score);

    camera.position.set(player.position.x * 0.5, 6, 15);
    camera.lookAt(player.position.x, 0, -20);
}

const setupBtn = (id, k) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; };
    el.ontouchend = (e) => { e.preventDefault(); keys[k] = false; };
};
setupBtn('btn-l', 'l'); setupBtn('btn-r', 'r');
setupBtn('btn-a', 'a'); setupBtn('btn-b', 'b');

initScene();
function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
animate();
</script>
</body>
</html>
