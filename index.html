<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APEX POINT | High Speed Dubai</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
    user-select: none;
  }

  #canvas { display: block; width: 100vw; height: 100vh; }

  /* UI Layers */
  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
    transition: opacity 0.5s ease;
  }
  .hidden { display: none !important; opacity: 0; pointer-events: none; }

  /* Home Screen Elements */
  .game-title {
    font-family: 'Orbitron'; font-size: clamp(40px, 10vw, 90px); font-weight: 900;
    background: linear-gradient(#fff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 5px;
  }
  
  .sub-title { color: #888; font-weight: 700; letter-spacing: 4px; margin-bottom: 40px; font-size: 14px; }

  /* Car Chooser */
  .car-selector { display: flex; gap: 20px; margin-bottom: 50px; }
  .car-opt {
    width: 80px; height: 50px; border: 3px solid #333; border-radius: 10px;
    cursor: pointer; transition: 0.3s; position: relative;
  }
  .car-opt.active { border-color: #00ff88; transform: scale(1.2); box-shadow: 0 0 25px rgba(0,255,136,0.4); }
  .car-opt.active::after { content: '✓'; position: absolute; top: -10px; right: -10px; background: #00ff88; color: #000; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

  /* Buttons */
  .btn {
    pointer-events: all; cursor: pointer;
    background: #00ff88; color: #000;
    font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900;
    padding: 18px 70px; border: none; border-radius: 50px;
    margin-bottom: 15px; transition: 0.2s; box-shadow: 0 10px 30px rgba(0,255,136,0.3);
    text-transform: uppercase;
  }
  .btn:active { transform: scale(0.95); }

  /* Thank You Bar */
  .thanks-bar {
    position: absolute; bottom: 30px; background: rgba(255,255,255,0.05);
    padding: 12px 30px; border-radius: 30px; font-size: 11px; letter-spacing: 2px;
    color: #666; font-weight: 700; border: 1px solid rgba(255,255,255,0.1);
  }
  .thanks-bar span { color: #00ff88; margin-left: 10px; text-transform: uppercase; }

  /* HUD */
  #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 25px; }
  #points-card { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 10px 40px; border-radius: 20px; border: 1px solid rgba(0,255,136,0.2); text-align: center; }
  #score-val { font-family: 'Orbitron'; font-size: 40px; font-weight: 900; }
  
  #hull-card { position: absolute; top: 25px; left: 25px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 15px; }
  #durability { font-size: 24px; color: #ff4444; letter-spacing: 5px; }

  #nitro-card { position: absolute; bottom: 250px; left: 25px; width: 200px; }
  #nitro-bar { height: 8px; width: 100%; background: #222; border-radius: 4px; overflow: hidden; }
  #nitro-fill { height: 100%; background: #00f2fe; width: 100%; transition: width 0.1s; }

  #speed-card { position: absolute; bottom: 240px; right: 25px; text-align: right; }
  #speed-val { font-family: 'Orbitron'; font-size: 70px; font-weight: 900; font-style: italic; line-height: 1; }

  /* Controls */
  #controls { position: fixed; bottom: 40px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 20; pointer-events: none; }
  .ctrl-btn { pointer-events: all; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; backdrop-filter: blur(5px); }
  .pedal { width: 100px; height: 160px; border-radius: 20px; font-size: 18px; font-weight: 900; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="overlay" id="home-screen">
  <div class="game-title">Apex Point</div>
  <div class="sub-title">DUBAI HIGHWAY CHALLENGE</div>
  
  <p style="margin-bottom: 15px; font-size: 12px; letter-spacing: 2px; color: #aaa;">CHOOSE YOUR SPEC</p>
  <div class="car-selector">
    <div class="car-opt active" onclick="setCar(0x0066ff, this)" style="background:#0066ff"></div>
    <div class="car-opt" onclick="setCar(0xff3300, this)" style="background:#ff3300"></div>
    <div class="car-opt" onclick="setCar(0xeeeeee, this)" style="background:#eeeeee"></div>
  </div>

  <button class="btn" onclick="initGame()">Start Drive</button>
  
  <div class="thanks-bar">
    SPECIAL THANKS: <span>DEV • BASIL • ASHMITH • EDWIN</span>
  </div>
</div>

<div id="hud" class="hidden">
  <div id="hull-card">
    <div style="font-size:10px; color:#aaa; margin-bottom:2px">CHASSIS</div>
    <div id="durability">♥♥♥</div>
  </div>
  <div id="points-card">
    <div style="font-size:10px; color:#00ff88; letter-spacing:2px">POINTS</div>
    <div id="score-val">0</div>
  </div>
  <div id="nitro-card">
    <div style="font-size:10px; color:#00f2fe; margin-bottom:5px">NITRO</div>
    <div id="nitro-bar"><div id="nitro-fill"></div></div>
  </div>
  <div id="speed-card">
    <div id="speed-val">0</div>
    <div style="font-size:14px; color:#00ff88; font-weight:bold">KM/H</div>
  </div>
</div>

<div id="controls" class="hidden">
  <div style="display:flex; gap:15px">
    <div class="ctrl-btn" id="btn-left">◀</div>
    <div class="ctrl-btn" id="btn-right">▶</div>
  </div>
  <div style="display:flex; gap:15px; align-items: flex-end;">
    <div class="ctrl-btn pedal" id="btn-brake" style="background:rgba(255,0,0,0.1)">BRAKE</div>
    <div style="display:flex; flex-direction:column; gap:10px">
        <div class="ctrl-btn" id="btn-nitro" style="height:50px; width:110px; border-radius:25px; font-size:14px; background:rgba(0,242,254,0.2)">NITRO</div>
        <div class="ctrl-btn pedal" id="btn-accel" style="border-color:#00ff88; color:#00ff88">GAS</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let gameState = 'HOME';
let score = 0, speed = 0, nitro = 100, playerX = 0, lives = 3;
let selectedColor = 0x0066ff;
let playerY = 0, playerVY = 0, isJumping = false;
const traffic = [];
const powerups = [];
const keys = {};

// SPEED CONSTANTS (Mapped to KM/H display logic)
const MAX_BASE_SPEED = 2.61; // Results in ~300 KM/H
const MAX_NITRO_SPEED = 3.04; // Results in ~350 KM/H

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(50, 100, 50);
scene.add(sun);

function createCar(color) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 4.8), new THREE.MeshStandardMaterial({color: color, metalness: 0.8, roughness: 0.2}));
    body.position.y = 0.5; group.add(body);
    const cab = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 2.0), new THREE.MeshStandardMaterial({color: 0x111111}));
    cab.position.set(0, 1.1, 0.2); group.add(cab);
    const wGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16); wGeo.rotateZ(Math.PI/2);
    [[-1,0.4,1.5],[1,0.4,1.5],[-1,0.4,-1.5],[1,0.4,-1.5]].forEach(p => {
        const w = new THREE.Mesh(wGeo, new THREE.MeshStandardMaterial({color: 0x111111})); w.position.set(...p); group.add(w);
    });
    return group;
}

function createTruck(isRamp = false) {
    const group = new THREE.Group();
    const cab = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.4, 2.5), new THREE.MeshStandardMaterial({color: isRamp ? 0xffcc00 : 0x444444}));
    cab.position.set(0, 1.2, -4); group.add(cab);
    if(isRamp) {
        const ramp = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.3, 11), new THREE.MeshStandardMaterial({color: 0x222222}));
        ramp.rotation.x = -0.18; ramp.position.set(0, 0.9, 1); group.add(ramp);
        const railL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 11), new THREE.MeshStandardMaterial({color: 0xffff00}));
        railL.position.set(-1.4, 1.2, 1); railL.rotation.x = -0.18; group.add(railL);
        const railR = railL.clone(); railR.position.x = 1.4; group.add(railR);
        group.type = 'ramp';
    } else {
        const trailer = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.8, 10), new THREE.MeshStandardMaterial({color: 0x888888}));
        trailer.position.set(0, 1.4, 2); group.add(trailer);
        group.type = 'truck';
    }
    return group;
}

function createPowerUp(type) {
    const p = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({
        color: type === 'NITRO' ? 0x00f2fe : 0xff4444, 
        emissive: type === 'NITRO' ? 0x00f2fe : 0xff4444,
        emissiveIntensity: 2
    }));
    p.type = 'powerup'; p.powerType = type; return p;
}

let player;
function setCar(color, el) {
    selectedColor = color;
    document.querySelectorAll('.car-opt').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
}

const roadSegments = [];
function createRoad(z) {
    const group = new THREE.Group();
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
    ground.rotation.x = -Math.PI/2; group.add(ground);
    for(let i=0; i<4; i++) {
        const h = 50 + Math.random()*200;
        const b = new THREE.Mesh(new THREE.BoxGeometry(20, h, 20), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
        b.position.set(i%2===0?-40:40, h/2, (Math.random()-0.5)*80); group.add(b);
    }
    group.position.z = z; scene.add(group); return group;
}

function initGame() {
    gameState = 'PLAY';
    score = 0; speed = 0; nitro = 100; lives = 3; playerX = 0; playerY = 0;
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
    if(player) scene.remove(player);
    player = createCar(selectedColor); scene.add(player);
    traffic.forEach(t => scene.remove(t)); traffic.length = 0;
    powerups.forEach(p => scene.remove(p)); powerups.length = 0;
    roadSegments.forEach(r => scene.remove(r)); roadSegments.length = 0;
    for(let i=0; i<15; i++) roadSegments.push(createRoad(-i * 100));
}

function spawn() {
    if(gameState !== 'PLAY') return;
    const lane = [-9, -3, 3, 9][Math.floor(Math.random()*4)];
    const roll = Math.random();
    if(roll < 0.5) {
        const p = createPowerUp(Math.random() > 0.3 ? 'NITRO' : 'REPAIR');
        p.position.set(lane, 1.5, -800); scene.add(p); powerups.push(p);
    } else {
        const typeRoll = Math.random();
        let t;
        if(typeRoll > 0.8) t = createTruck(true);
        else if(typeRoll > 0.6) t = createTruck(false);
        else t = createCar(0x666666);
        t.position.set(lane, 0, -800); scene.add(t); traffic.push(t);
    }
}
setInterval(spawn, 500);

function update() {
    if(gameState !== 'PLAY') return;

    if(keys['left']) playerX -= 0.65; if(keys['right']) playerX += 0.65;
    playerX = Math.max(-12, Math.min(12, playerX));
    player.position.x += (playerX - player.position.x) * 0.25;
    player.rotation.z = (playerX - player.position.x) * -0.2;

    const isNitro = keys['nitro'] && nitro > 1;
    let target = keys['accel'] ? MAX_BASE_SPEED : 0.8;
    if(keys['brake']) target = 0.1;
    if(isNitro) { target = MAX_NITRO_SPEED; nitro -= 0.9; } else if(nitro < 100) nitro += 0.15;
    
    speed += (target - speed) * 0.05;
    score += speed * (isJumping ? 2 : 0.5);

    if(isJumping) {
        playerVY -= 0.02; playerY += playerVY;
        if(playerY <= 0) { playerY = 0; playerVY = 0; isJumping = false; }
    }
    player.position.y = playerY;

    roadSegments.forEach(r => {
        r.position.z += speed;
        if(r.position.z > 100) r.position.z -= 1500;
    });

    for(let i=traffic.length-1; i>=0; i--) {
        const t = traffic[i]; t.position.z += speed - 1.5;
        const dx = Math.abs(t.position.x - player.position.x);
        const dz = t.position.z - player.position.z;
        if(t.type === 'ramp' && dx < 2.0 && dz > -10 && dz < -4 && !isJumping) {
            isJumping = true; playerVY = 0.5 + (speed * 0.04); playerX = t.position.x;
        } else if(dx < 2.2 && Math.abs(dz) < 4.5 && Math.abs(playerY - t.position.y) < 1.0) {
            lives--; speed *= 0.2; scene.remove(t); traffic.splice(i,1);
            document.getElementById('durability').innerText = '♥'.repeat(lives);
            if(lives <= 0) location.reload();
            continue;
        }
        if(t.position.z > 50) { scene.remove(t); traffic.splice(i,1); }
    }

    for(let i=powerups.length-1; i>=0; i--) {
        const p = powerups[i]; p.position.z += speed; p.rotation.y += 0.05;
        if(Math.abs(p.position.x - player.position.x) < 2.5 && Math.abs(p.position.z - player.position.z) < 3) {
            if(p.powerType === 'NITRO') nitro = Math.min(100, nitro + 40);
            else lives = Math.min(3, lives + 1);
            document.getElementById('durability').innerText = '♥'.repeat(lives);
            scene.remove(p); powerups.splice(i, 1); continue;
        }
        if(p.position.z > 50) { scene.remove(p); powerups.splice(i,1); }
    }

    // Dynamic FOV for speed sensation
    camera.fov = 60 + (speed * 12);
    camera.updateProjectionMatrix();
    
    const camZ = 15 + (speed * 1.5);
    const shake = isNitro ? (Math.random()-0.5)*0.08 : 0;
    camera.position.lerp(new THREE.Vector3(player.position.x * 0.5 + shake, 6 + (playerY * 0.5) + shake, camZ), 0.1);
    camera.lookAt(player.position.x, 1 + playerY, -100);

    // Map logic speed to KM/H display (MAX_NITRO_SPEED 3.04 approx 350kmh)
    document.getElementById('speed-val').innerText = Math.floor(speed * 115);
    document.getElementById('score-val').innerText = Math.floor(score);
    document.getElementById('nitro-fill').style.width = nitro + '%';
}

const bind = (id, k) => {
    const el = document.getElementById(id);
    el.ontouchstart = e => { e.preventDefault(); keys[k] = true; };
    el.ontouchend = e => { e.preventDefault(); keys[k] = false; };
};
bind('btn-left', 'left'); bind('btn-right', 'right');
bind('btn-accel', 'accel'); bind('btn-brake', 'brake');
bind('btn-nitro', 'nitro');

function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
animate();
window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
</script>
</body>
</html>
