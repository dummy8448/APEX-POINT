<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APEX POINT | High Speed Dubai</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: #87ceeb;
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    user-select: none;
  }

  #canvas { display: block; width: 100vw; height: 100vh; }

  #hud {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #mini-map {
    position: absolute;
    top: 20px; right: 20px;
    width: 70px; height: 160px;
    background: rgba(0, 0, 0, 0.4);
    border: 2px solid rgba(255,255,255,0.8);
    border-radius: 8px;
    backdrop-filter: blur(5px);
    overflow: hidden;
  }
  #map-player {
    position: absolute;
    width: 6px; height: 10px;
    background: #00ff88;
    left: 50%; bottom: 15px;
    transform: translateX(-50%);
    box-shadow: 0 0 8px #00ff88;
    z-index: 2;
  }

  #stats-panel {
    position: absolute;
    top: 20px; left: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 8px;
  }

  #score-panel {
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    background: rgba(0,0,0,0.4);
    padding: 5px 20px;
    border-radius: 20px;
  }
  #score-val { font-size: 32px; font-weight: 700; }

  /* FIX: MOVED SPEEDOMETER HIGHER TO CLEAR TOUCH BUTTONS */
  #speedometer-stack {
    position: absolute;
    bottom: 230px; 
    left: 20px;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(0,0,0,0.4);
    padding: 12px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  #speed-display { display: flex; align-items: baseline; gap: 5px; }
  #speed-val { font-size: 48px; font-weight: 900; color: #fff; line-height: 1; }
  .kmh-unit { font-size: 12px; color: #00ff88; font-weight: 800; }

  #nitro-track {
    width: 160px; height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  #nitro-fill {
    height: 100%;
    background: linear-gradient(90deg, #00f2fe, #4facfe);
    width: 100%;
    box-shadow: 0 0 10px #00f2fe;
    transition: width 0.1s linear;
  }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; background: linear-gradient(to bottom, #87ceeb 0%, #e0f6ff 100%);
  }
  .hidden { display: none !important; }

  .game-title {
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 900; letter-spacing: 4px; color: #111;
    margin-bottom: 20px; text-shadow: 2px 2px 0px #00ff88;
  }

  #credits-bar {
    background: rgba(0,0,0,0.85);
    color: #00ff88;
    padding: 10px 25px;
    border-radius: 30px;
    font-size: 10px;
    letter-spacing: 1.5px;
    margin-bottom: 30px;
    border: 1px solid rgba(0,255,136,0.3);
    text-align: center;
  }

  .car-selection {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
  }
  .car-opt {
    width: 80px; height: 45px;
    border: 2px solid #111;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 12px; color: #000;
  }
  .car-opt.active { border-color: #00ff88; background: #00ff88; }

  .btn {
    pointer-events: all; cursor: pointer;
    background: #111; color: #fff;
    font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700;
    padding: 15px; border: none; border-radius: 8px;
    width: 250px; margin-bottom: 12px; transition: 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:active { transform: scale(0.95); }
  .btn.outline { background: transparent; border: 2px solid #111; color: #111; }

  #damage-flash {
    position: fixed; inset: 0;
    background: red; opacity: 0;
    pointer-events: none; z-index: 100;
  }

  /* FIX: LOWER HEIGHT AND BETTER SPACING FOR MOBILE CONTROLS */
  #touch-controls {
    position: fixed; bottom: 15px; left: 0; right: 0;
    height: 150px; pointer-events: none; z-index: 15;
  }
  .t-btn {
    pointer-events: all; background: rgba(0,0,0,0.3);
    border: 2px solid rgba(255,255,255,0.4); border-radius: 20px;
    display: flex; align-items: center; justify-content: center; color: white;
    backdrop-filter: blur(5px);
  }
  .t-btn.active { background: rgba(0,255,136,0.6); }
  
  #t-steer { position: absolute; left: 20px; bottom: 0; display: flex; gap: 10px; }
  #t-actions { position: absolute; right: 20px; bottom: 0; display: flex; gap: 10px; flex-direction: column; }
  .circle { width: 75px; height: 75px; font-size: 24px; border-radius: 50%; }
  .pedal { width: 85px; height: 110px; font-size: 13px; font-weight: bold; }

  @media (min-width: 769px) { #touch-controls { display: none; } }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="damage-flash"></div>

<div id="hud" class="hidden">
  <div id="stats-panel">
    <div style="font-size:9px; color:#00ff88; margin-bottom:2px">HULL</div>
    <div id="durability">♥♥♥</div>
  </div>
  
  <div id="mini-map"><div id="map-player"></div></div>
  
  <div id="score-panel">
    <div id="score-val">0</div>
  </div>
  
  <div id="speedometer-stack">
    <div id="speed-display">
      <div id="speed-val">0</div>
      <div class="kmh-unit">KM/H</div>
    </div>
    <div id="nitro-track"><div id="nitro-fill"></div></div>
    <div style="font-size:8px; letter-spacing: 1px; opacity:0.8">NITRO CHARGE</div>
  </div>
</div>

<div class="screen" id="start-screen">
  <div class="game-title">APEX POINT</div>
  
  <div id="credits-bar">
    THANKS: BASIL • ASHMITH • EDWIN • DEV
  </div>

  <div style="color:#111; margin-bottom:10px; font-size:12px; font-weight:bold; letter-spacing:1px">SELECT VEHICLE</div>
  <div class="car-selection">
    <div class="car-opt active" onclick="selectCar(0, this)">GREY</div>
    <div class="car-opt" onclick="selectCar(1, this)" style="color:#ff4444">RED</div>
    <div class="car-opt" onclick="selectCar(2, this)" style="color:#4facfe">BLUE</div>
  </div>

  <button class="btn" onclick="startGame()">START DRIVE</button>
  <div style="color: #444; font-size: 10px; letter-spacing: 2px; font-weight: bold; margin-top: 20px;">DUMB BRAINEZ PRODUCTIONS</div>
</div>

<div class="screen hidden" id="gameover-screen">
  <div class="game-title" style="color:#ff4444">TOTALED</div>
  <div style="text-align: center; margin-bottom: 25px;">
    <p style="color:#111; font-size:14px; font-weight:bold; opacity:0.6">DISTANCE SCORE</p>
    <h1 id="final-score" style="font-size: 72px; color: #111;">0</h1>
  </div>
  
  <button class="btn" onclick="startGame()">RETRY RUN</button>
  <button class="btn outline" onclick="goHome()">HOME MENU</button>
</div>

<div id="touch-controls">
  <div id="t-steer">
    <div class="t-btn circle" id="btn-left">◀</div>
    <div class="t-btn circle" id="btn-right">▶</div>
  </div>
  <div id="t-actions">
    <div class="t-btn" id="btn-nitro" style="height:40px; border-radius:20px; font-size:10px; font-weight:bold;">NITRO</div>
    <div style="display:flex; gap:10px">
        <div class="t-btn pedal" id="btn-brake">BRAKE</div>
        <div class="t-btn pedal" id="btn-accel" style="border-color:#00ff88">GAS</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let gameState = 'START';
let score = 0;
let speed = 0;
let nitro = 100;
let playerX = 0;
let lives = 3;
let selectedCarColor = 0x888888;
const traffic = [];
const keys = {};

const MAX_SPD_BASE = 2.5; 
const MAX_SPD_NITRO = 3.2;
const TRAFFIC_SPD = 1.0;
const SCORE_RATE = 0.05;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const ambient = new THREE.AmbientLight(0xffffff, 0.85);
const sun = new THREE.DirectionalLight(0xfff5e1, 1.7);
sun.position.set(100, 200, -100);
scene.add(ambient, sun);

function createDetailedCar(color, isPlayer = false) {
    const car = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({color: color, metalness: 0.8, roughness: 0.2});
    const glassMat = new THREE.MeshStandardMaterial({color: 0x111111, metalness: 1, roughness: 0.1, transparent: true, opacity: 0.9});
    const lightMat = new THREE.MeshBasicMaterial({color: 0xffffff}); 
    const tailMat = new THREE.MeshBasicMaterial({color: 0xff0000}); 
    const blackMat = new THREE.MeshStandardMaterial({color: 0x111111});

    const body = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.6, 5.0), bodyMat);
    body.position.y = 0.45;
    car.add(body);

    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 2.2), glassMat);
    cabin.position.set(0, 0.9, 0.4);
    car.add(cabin);
    
    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.1, 1.8), bodyMat);
    roof.position.set(0, 1.15, 0.4);
    car.add(roof);

    const wing = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.05, 0.6), bodyMat);
    wing.position.set(0, 1.1, 2.3);
    car.add(wing);

    const lightL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.1), lightMat);
    lightL.position.set(-0.8, 0.55, -2.46);
    car.add(lightL);
    const lightR = lightL.clone(); lightR.position.x = 0.8; car.add(lightR);

    const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 16);
    wheelGeo.rotateZ(Math.PI/2);
    const wheelMat = new THREE.MeshStandardMaterial({color: 0x222222});
    const wPos = [[-1, 0.4, 1.6], [1, 0.4, 1.6], [-1, 0.4, -1.6], [1, 0.4, -1.6]];
    wPos.forEach(p => {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.position.set(...p);
        car.add(w);
    });

    return car;
}

function selectCar(index, el) {
    const colors = [0x888888, 0xff4444, 0x4facfe];
    selectedCarColor = colors[index];
    document.querySelectorAll('.car-opt').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
    scene.remove(player);
    player = createDetailedCar(selectedCarColor, true);
    scene.add(player);
}

let player = createDetailedCar(selectedCarColor, true);
scene.add(player);

function createBuilding() {
    const h = 50 + Math.random() * 120;
    const b = new THREE.Mesh(new THREE.BoxGeometry(22, h, 22), 
        new THREE.MeshStandardMaterial({
            color: [0xcccccc, 0xaaaaaa, 0xeeeeee, 0x333333][Math.floor(Math.random()*4)],
            metalness: 0.5, roughness: 0.2
        })
    );
    b.position.y = h/2;
    return b;
}

const segments = [];
const SEG_SIZE = 100;
const SEG_COUNT = 15;

function createSegment(z) {
    const group = new THREE.Group();
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1500, SEG_SIZE), new THREE.MeshStandardMaterial({color: 0x388e3c}));
    ground.rotation.x = -Math.PI/2;
    const road = new THREE.Mesh(new THREE.PlaneGeometry(24, SEG_SIZE), new THREE.MeshStandardMaterial({color: 0x181818}));
    road.rotation.x = -Math.PI/2; road.position.y = 0.05;
    group.add(ground, road);

    for(let i=0; i<10; i++) {
        let x = (45 + Math.random()*180) * (Math.random() > 0.5 ? 1 : -1);
        let posZ = (Math.random() - 0.5) * SEG_SIZE;
        const b = createBuilding(); b.position.set(x, 0, posZ); group.add(b);
    }
    group.position.z = z;
    scene.add(group);
    return group;
}

function goHome() {
    gameState = 'START';
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('start-screen').classList.remove('hidden');
    document.getElementById('hud').classList.add('hidden');
}

function startGame() {
    gameState = 'PLAY';
    score = 0; speed = 0; nitro = 100; playerX = 0; lives = 3;
    traffic.forEach(t => { if(t.dot) t.dot.remove(); scene.remove(t); });
    traffic.length = 0;
    segments.forEach(s => scene.remove(s));
    segments.length = 0;
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 200, 1400);
    for(let i=0; i<SEG_COUNT; i++) segments.push(createSegment(-i * SEG_SIZE));
    updateHUD();
}

function updateHUD() {
    document.getElementById('durability').innerText = '♥'.repeat(lives);
}

function spawnTraffic() {
    if (gameState !== 'PLAY') return;
    const lanes = [-9, -3, 3, 9];
    const lane = lanes[Math.floor(Math.random() * lanes.length)];
    const tColor = [0xffffff, 0xffcc00, 0x555555][Math.floor(Math.random()*3)];
    const car = createDetailedCar(tColor);
    car.position.set(lane, 0.0, -800);
    car.speed = TRAFFIC_SPD;
    const dot = document.createElement('div');
    dot.style.cssText = "position:absolute; width:5px; height:5px; background:#ff4444; border-radius:50%; left:50%; transform:translateX(-50%);";
    document.getElementById('mini-map').appendChild(dot);
    car.dot = dot;
    scene.add(car);
    traffic.push(car);
}
setInterval(spawnTraffic, 600);

function update() {
    if (gameState !== 'PLAY') return;

    if (keys['ArrowLeft'] || keys['KeyA'] || keys['left']) playerX -= 0.38;
    if (keys['ArrowRight'] || keys['KeyD'] || keys['right']) playerX += 0.38;
    playerX = Math.max(-11, Math.min(11, playerX));
    player.position.x += (playerX - player.position.x) * 0.16;
    player.rotation.z = (playerX - player.position.x) * -0.12;

    const isNitro = (keys['ShiftLeft'] || keys['nitro']) && nitro > 1;
    let target = keys['ArrowUp'] || keys['accel'] ? MAX_SPD_BASE : 0.8;
    if (keys['ArrowDown'] || keys['brake']) target = 0.2;
    if (isNitro) { target = MAX_SPD_NITRO; nitro -= 0.65; } 
    else if(nitro < 100) { nitro += 0.15; }
    
    speed += (target - speed) * 0.045;
    score += speed * SCORE_RATE; 

    segments.forEach(seg => {
        seg.position.z += speed;
        if(seg.position.z > SEG_SIZE) seg.position.z -= SEG_COUNT * SEG_SIZE;
    });

    for(let i=traffic.length-1; i>=0; i--) {
        const t = traffic[i];
        t.position.z += speed - t.speed;
        const relativeZ = Math.abs(t.position.z);
        t.dot.style.bottom = (160 - (relativeZ * 0.4)) + 'px';
        t.dot.style.left = `calc(50% + ${t.position.x * 2.5}px)`;

        if (Math.abs(t.position.x - player.position.x) < 2.1 && Math.abs(t.position.z - player.position.z) < 4.6) {
            document.getElementById('damage-flash').style.opacity = '0.5';
            setTimeout(() => document.getElementById('damage-flash').style.opacity = '0', 100);
            lives--; updateHUD();
            t.dot.remove(); scene.remove(t); traffic.splice(i, 1);
            speed *= 0.1;
            if (lives <= 0) {
                gameState = 'GAMEOVER';
                document.getElementById('gameover-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = Math.floor(score);
            }
            continue;
        }
        if(t.position.z > 50) { t.dot.remove(); scene.remove(t); traffic.splice(i, 1); }
    }

    camera.position.set(player.position.x * 0.2, 5.4 + (speed * 0.2), 14 + (speed * 1.6));
    camera.lookAt(player.position.x, 1.4, -120);

    document.getElementById('speed-val').innerText = Math.floor(speed * 100);
    document.getElementById('score-val').innerText = Math.floor(score);
    document.getElementById('nitro-fill').style.width = nitro + '%';
    document.getElementById('map-player').style.left = `calc(50% + ${player.position.x * 2.5}px)`;
}

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

const bind = (id, k) => {
    const el = document.getElementById(id);
    el.ontouchstart = e => { e.preventDefault(); keys[k] = true; el.classList.add('active'); };
    el.ontouchend = e => { e.preventDefault(); keys[k] = false; el.classList.remove('active'); };
};
bind('btn-left', 'left'); bind('btn-right', 'right');
bind('btn-accel', 'accel'); bind('btn-brake', 'brake');
bind('btn-nitro', 'nitro');

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}
animate();

window.onresize = () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
