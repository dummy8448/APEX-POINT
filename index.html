<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAG ATTACK v1.18 - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        body { font-family: 'Outfit', sans-serif; touch-action: none; overflow: hidden; background: #7dd3fc; user-select: none; margin: 0; padding: 0; }
        canvas { display: block; width: 100vw; height: 100vh; background: #7dd3fc; }
        
        .gumball-panel { background: #ffffff; border: 6px solid #0f172a; box-shadow: 10px 10px 0px #0f172a; border-radius: 35px; }
        .status-pill {
            background: white; border: 4px solid #0f172a; padding: 8px 20px;
            border-radius: 15px; font-weight: 900; font-size: 18px;
            box-shadow: 4px 4px 0px #0f172a; color: #0f172a;
        }

        #chat-ui { position: fixed; bottom: 180px; left: 20px; width: 220px; z-index: 100; pointer-events: none; display: flex; flex-direction: column; }
        #chat-box { max-height: 120px; overflow-y: hidden; display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
        .chat-bubble { background: rgba(15, 23, 42, 0.85); color: white; padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; width: fit-content; animation: fadeIn 0.3s ease; border: 1px solid rgba(255,255,255,0.1); word-break: break-word; }
        #chat-input-container { pointer-events: auto; display: flex; background: white; border: 3px solid #0f172a; border-radius: 12px; overflow: hidden; height: 35px; }
        #chat-input { flex: 1; background: transparent; border: none; padding: 0 10px; font-weight: 900; font-size: 12px; outline: none; color: #0f172a; }
        #chat-send { background: #fbbf24; border-left: 3px solid #0f172a; padding: 0 10px; font-weight: 900; font-size: 11px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .joystick-base { width: 100px; height: 100px; background: rgba(15, 23, 42, 0.1); border: 4px solid #0f172a; border-radius: 50%; position: fixed; bottom: 40px; left: 40px; display: flex; align-items: center; justify-content: center; z-index: 50; }
        .joystick-knob { width: 40px; height: 40px; background: #fbbf24; border: 4px solid #0f172a; border-radius: 50%; pointer-events: none; }
        
        .btn-dash { position: fixed; bottom: 40px; right: 40px; width: 100px; height: 100px; background: #ef4444; border: 5px solid #0f172a; box-shadow: 6px 6px 0px #0f172a; border-radius: 25px; color: white; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; transition: all 0.1s; font-size: 18px; }
        .btn-dash:active { transform: translate(3px, 3px); box-shadow: 3px 3px 0px #0f172a; }
        .stamina-bar { width: 60%; height: 6px; background: rgba(0,0,0,0.2); border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .stamina-fill { height: 100%; background: #4ade80; width: 100%; transition: width 0.1s; }

        .skin-opt { width: 45px; height: 45px; border: 4px solid #0f172a; border-radius: 12px; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .skin-opt.active { transform: scale(1.2); border-color: #fbbf24; z-index: 10; }

        #loading-overlay { position: fixed; inset: 0; background: rgba(125, 211, 252, 0.9); z-index: 500; display: none; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; color: #0f172a; }
        #error-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 900; z-index: 1000; display: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">CONNECTING...</div>
    <div id="error-msg">ERROR!</div>

    <div id="menu" class="fixed inset-0 z-[150] flex flex-col items-center justify-center p-4 bg-[#7dd3fc]">
        <div class="gumball-panel p-8 w-full max-w-sm text-center">
            <h1 class="text-5xl font-black italic text-slate-800 uppercase mb-1">TAG ATTACK</h1>
            <p class="text-red-600 font-black mb-6 text-sm italic tracking-widest uppercase">V1.18 STABLE</p>
            <input type="text" id="nameInput" placeholder="YOUR NAME" class="w-full bg-slate-50 border-4 border-slate-800 p-4 rounded-2xl text-center font-black text-xl outline-none uppercase mb-4">
            
            <p class="text-xs font-bold text-slate-500 mb-2 uppercase">Select Skin</p>
            <div class="flex flex-wrap justify-center gap-2 mb-8">
                <div class="skin-opt active" data-skin="green" style="background: #22c55e;"></div>
                <div class="skin-opt" data-skin="black" style="background: #0f172a;"></div>
                <div class="skin-opt" data-skin="gumball" style="background: #7dd3fc; border-bottom: 8px solid #fde68a;"></div>
                <div class="skin-opt" data-skin="darwin" style="background: #f97316; border-bottom: 8px solid #4ade80;"></div>
            </div>

            <div class="space-y-4">
                <button onclick="openMapSelect()" class="w-full bg-yellow-400 border-4 border-slate-800 shadow-[6px_6px_0px_#0f172a] font-black py-4 rounded-2xl text-xl uppercase active:translate-y-1">HOST ROOM</button>
                <div class="flex gap-2">
                    <input type="text" id="roomInput" maxlength="4" placeholder="CODE" class="w-1/3 bg-white border-4 border-slate-800 rounded-2xl text-center font-black">
                    <button onclick="setupRoom(false)" class="w-2/3 bg-emerald-400 border-4 border-slate-800 shadow-[4px_4px_0px_#0f172a] font-black py-4 rounded-2xl text-lg uppercase active:translate-y-1">JOIN</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mapMenu" class="fixed inset-0 z-[160] flex flex-col items-center justify-center p-4 bg-[#7dd3fc] hidden">
        <div class="gumball-panel p-8 w-full max-w-sm text-center">
            <h2 class="text-3xl font-black mb-6 italic uppercase">ARENA</h2>
            <button onclick="startHost(2)" class="w-full bg-blue-400 border-4 border-slate-800 py-4 rounded-2xl font-black mb-4 shadow-[4px_4px_0px_#0f172a] text-white italic">ELMORE SUBURBS</button>
            <button onclick="startHost(0)" class="w-full bg-emerald-400 border-4 border-slate-800 py-4 rounded-2xl font-black mb-4 shadow-[4px_4px_0px_#0f172a]">MAZE CITY</button>
        </div>
    </div>

    <div id="hud" class="fixed top-5 left-0 right-0 flex justify-center gap-4 z-50 pointer-events-none hidden">
        <div id="timerBox" class="status-pill">03:00</div>
        <div id="roomDisplay" class="status-pill border-blue-500 text-blue-500">ID: ----</div>
    </div>

    <div id="chat-ui" class="hidden">
        <div id="chat-box"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Chat..." maxlength="30">
            <button id="chat-send">GO</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls" class="hidden">
        <div class="joystick-base" id="joyBase"><div class="joystick-knob" id="joyKnob"></div></div>
        <button class="btn-dash" id="dashBtn">
            DASH
            <div class="stamina-bar"><div id="staminaFill" class="stamina-fill"></div></div>
        </button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let myId, peer, conn, isHost = false, players = {}, myName = "";
        let joyPos = { x: 0, y: 0 }, isJoy = false, isDashing = false, stamina = 100;
        let worldSize = 3000, cam = { x: 1500, y: 1500 };
        let obstacles = [], selectedMap = 0, matchTimer = 180;
        let mySkin = "green";
        let activeConnections = [];
        let networkTick = 0;

        const maps = [
            { bg: "#7dd3fc", floor: "#4ade80", wall: "#0f172a" },
            { bg: "#020617", floor: "#0f172a", wall: "#06b6d4" },
            { bg: "#bae6fd", floor: "#fbbf24", wall: "#f87171" }
        ];

        function showError(txt) {
            const el = document.getElementById('error-msg');
            el.innerText = txt; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        // Chat Logic
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');
        const chatSend = document.getElementById('chat-send');

        function addChatMessage(name, msg) {
            const div = document.createElement('div');
            div.className = 'chat-bubble';
            div.innerText = `${name}: ${msg}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            setTimeout(() => div.remove(), 5000);
        }

        function sendChat() {
            const msg = chatInput.value.trim();
            if(!msg) return;
            addChatMessage("YOU", msg);
            chatInput.value = "";
            if(isHost) {
                activeConnections.forEach(c => c.send({ type: 'chat', name: myName, msg: msg }));
            } else if(conn && conn.open) {
                conn.send({ type: 'chat', name: myName, msg: msg });
            }
        }
        chatSend.onclick = sendChat;

        document.querySelectorAll('.skin-opt').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.skin-opt').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                mySkin = opt.dataset.skin;
            };
        });

        function openMapSelect() {
            if(!document.getElementById('nameInput').value.trim()) { showError("ENTER NAME!"); return; }
            document.getElementById('mapMenu').classList.remove('hidden');
        }

        function generateObstacles(mapIdx) {
            const obs = [];
            // Borders
            obs.push({x: -50, y: -50, w: worldSize+100, h: 50}, {x: -50, y: worldSize, w: worldSize+100, h: 50}, {x: -50, y: -50, w: 50, h: worldSize+100}, {x: worldSize, y: -50, w: 50, h: worldSize+100});
            // Random blocks
            for(let i=0; i<15; i++) {
                obs.push({
                    x: Math.random() * (worldSize - 600) + 300,
                    y: Math.random() * (worldSize - 600) + 300,
                    w: Math.random() > 0.5 ? 300 : 100,
                    h: Math.random() > 0.5 ? 100 : 300
                });
            }
            return obs;
        }

        function setupRoom(host) {
            const rawCode = document.getElementById('roomInput').value.trim();
            if(!host && !rawCode) { showError("ENTER ROOM CODE!"); return; }
            
            document.getElementById('loading-overlay').style.display = 'flex';
            isHost = host;
            myName = document.getElementById('nameInput').value.trim().toUpperCase() || "GUEST";
            const code = host ? Math.floor(1000 + Math.random()*9000).toString() : rawCode;
            
            peer = new Peer('tag-' + code);
            
            peer.on('open', (id) => {
                document.getElementById('loading-overlay').style.display = 'none';
                myId = id;
                document.getElementById('menu').style.display = 'none';
                document.getElementById('mapMenu').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('controls').classList.remove('hidden');
                document.getElementById('chat-ui').classList.remove('hidden');
                document.getElementById('roomDisplay').innerText = "ID: " + code;
                
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                if(host) {
                    obstacles = generateObstacles(selectedMap);
                    players[myId] = { x: 500, y: 500, isIt: true, name: myName, skin: mySkin, protection: 0 };
                    requestAnimationFrame(gameLoop);
                } else {
                    conn = peer.connect('tag-' + code);
                    conn.on('open', () => {
                        conn.send({ type: 'join', name: myName, skin: mySkin });
                        requestAnimationFrame(gameLoop);
                    });
                    conn.on('data', (d) => {
                        if(d.type === 'state') { players = d.players; obstacles = d.obstacles; selectedMap = d.map; matchTimer = d.timer; }
                        if(d.type === 'chat') addChatMessage(d.name, d.msg);
                    });
                    conn.on('close', () => location.reload());
                }
            });

            peer.on('error', (err) => {
                document.getElementById('loading-overlay').style.display = 'none';
                showError("CONNECTION FAILED!");
                console.error(err);
            });

            if(host) {
                peer.on('connection', (c) => {
                    activeConnections.push(c);
                    c.on('data', (d) => {
                        if(d.type === 'join') players[c.peer] = { x: 2500, y: 2500, isIt: false, name: d.name, skin: d.skin, protection: 5 };
                        if(d.type === 'move' && players[c.peer]) { players[c.peer].x = d.x; players[c.peer].y = d.y; }
                        if(d.type === 'chat') {
                            addChatMessage(d.name, d.msg);
                            activeConnections.forEach(co => { if(co.peer !== c.peer) co.send({ type: 'chat', name: d.name, msg: d.msg }); });
                        }
                    });
                    c.on('close', () => {
                        delete players[c.peer];
                        activeConnections = activeConnections.filter(con => con.peer !== c.peer);
                    });
                });
            }
        }

        function startHost(m) { selectedMap = m; setupRoom(true); }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // Movement Logic
        const joyBase = document.getElementById('joyBase');
        const handleJoy = (e) => {
            const touch = e.touches[0];
            const rect = joyBase.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width/2);
            const dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.min(40, Math.hypot(dx, dy));
            const angle = Math.atan2(dy, dx);
            joyPos.x = (Math.cos(angle) * dist) / 40;
            joyPos.y = (Math.sin(angle) * dist) / 40;
            document.getElementById('joyKnob').style.transform = `translate(${joyPos.x*30}px, ${joyPos.y*30}px)`;
        };
        joyBase.addEventListener('touchstart', (e) => { e.preventDefault(); isJoy = true; handleJoy(e); });
        window.addEventListener('touchmove', (e) => { if(isJoy) handleJoy(e); });
        window.addEventListener('touchend', (e) => { if(e.touches.length === 0) { isJoy = false; joyPos = {x:0, y:0}; document.getElementById('joyKnob').style.transform = 'translate(0,0)'; } });
        document.getElementById('dashBtn').addEventListener('touchstart', (e) => { e.preventDefault(); isDashing = true; });
        document.getElementById('dashBtn').addEventListener('touchend', () => { isDashing = false; });

        function moveWithCollision(p, dx, dy) {
            let nX = p.x + dx, nY = p.y + dy, rad = 45;
            let okX = true, okY = true;
            for(let ob of obstacles) {
                if(nX+rad > ob.x && nX-rad < ob.x+ob.w && p.y+rad > ob.y && p.y-rad < ob.y+ob.h) okX = false;
                if(p.x+rad > ob.x && p.x-rad < ob.x+ob.w && nY+rad > ob.y && nY-rad < ob.y+ob.h) okY = false;
            }
            if(okX) p.x = nX; if(okY) p.y = nY;
            // Map boundaries
            p.x = Math.max(0, Math.min(worldSize, p.x));
            p.y = Math.max(0, Math.min(worldSize, p.y));
        }

        function drawPlayer(p, id) {
            ctx.save();
            ctx.translate(p.x, p.y);
            if(p.isIt) {
                ctx.shadowBlur = 40; ctx.shadowColor = 'red';
                ctx.strokeStyle = 'red'; ctx.lineWidth = 10;
                ctx.strokeRect(-55,-55,110,110);
            }

            let bodyCol = p.skin === "black" ? "#0f172a" : p.skin === "gumball" ? "#7dd3fc" : p.skin === "darwin" ? "#f97316" : "#22c55e";
            ctx.fillStyle = "#0f172a"; 
            ctx.beginPath(); ctx.roundRect(-55,-55,110,110,25); ctx.fill();
            ctx.fillStyle = bodyCol;
            ctx.beginPath(); ctx.roundRect(-45,-45,90,90,20); ctx.fill();

            // Eyes
            const eX = (id === myId ? joyPos.x : 0) * 6, eY = (id === myId ? joyPos.y : 0) * 6;
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.roundRect(-24, -20, 18, 18, 5); ctx.fill();
            ctx.beginPath(); ctx.roundRect(6, -20, 18, 18, 5); ctx.fill();
            ctx.fillStyle = '#0f172a';
            ctx.beginPath(); ctx.roundRect(-18+eX, -14+eY, 8, 8, 2); ctx.fill();
            ctx.beginPath(); ctx.roundRect(12+eX, -14+eY, 8, 8, 2); ctx.fill();

            ctx.fillStyle = 'white'; ctx.font = "900 35px Outfit"; ctx.textAlign = "center";
            ctx.fillText(p.name, 0, -100);
            if(p.protection > 0) {
                ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 5;
                ctx.beginPath(); ctx.arc(0,0, 80, 0, Math.PI*2); ctx.stroke();
            }
            ctx.restore();
        }

        function gameLoop() {
            const curMap = maps[selectedMap];
            const me = players[myId];
            
            if(me) {
                // Dash & Stamina logic
                let actualDash = false;
                if(isDashing && stamina > 0) {
                    actualDash = true; stamina -= 1.5;
                } else if(stamina < 100) {
                    stamina += 0.5;
                }
                document.getElementById('staminaFill').style.width = stamina + "%";

                const speed = actualDash ? 22 : 11;
                moveWithCollision(me, joyPos.x * speed, joyPos.y * speed);
                cam.x += (me.x - cam.x) * 0.1; cam.y += (me.y - cam.y) * 0.1;

                if(isHost) {
                    matchTimer = Math.max(0, matchTimer - 0.016);
                    
                    // Safety check for IT player
                    let itId = Object.keys(players).find(k => players[k].isIt);
                    if(!itId && Object.keys(players).length > 0) {
                        players[Object.keys(players)[0]].isIt = true;
                        itId = Object.keys(players)[0];
                    }

                    if(itId) {
                        for(let id in players) {
                            if(id !== itId) {
                                if(players[id].protection > 0) players[id].protection = Math.max(0, players[id].protection - 0.016);
                                let dist = Math.hypot(players[id].x-players[itId].x, players[id].y-players[itId].y);
                                if(dist < 90 && players[id].protection <= 0 && players[itId].protection <= 0) {
                                    players[itId].isIt = false; players[itId].protection = 3;
                                    players[id].isIt = true; players[id].protection = 3;
                                }
                            } else if(players[itId].protection > 0) {
                                players[itId].protection = Math.max(0, players[itId].protection - 0.016);
                            }
                        }
                    }

                    // Throttle network state to 20fps instead of 60fps to save bandwidth
                    networkTick++;
                    if(networkTick % 3 === 0) {
                        activeConnections.forEach(c => c.send({type:'state', players, obstacles, map: selectedMap, timer: matchTimer}));
                    }
                } else if(conn?.open) {
                    conn.send({ type: 'move', x: me.x, y: me.y });
                }
            }

            ctx.fillStyle = curMap.bg; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(0.5, 0.5); ctx.translate(-cam.x, -cam.y);
            ctx.fillStyle = curMap.floor; ctx.fillRect(0,0,worldSize,worldSize);
            obstacles.forEach(ob => { ctx.fillStyle = curMap.wall; ctx.beginPath(); ctx.roundRect(ob.x, ob.y, ob.w, ob.h, 15); ctx.fill(); });
            for(let id in players) drawPlayer(players[id], id);
            ctx.restore();

            const min = Math.floor(matchTimer/60), sec = Math.floor(matchTimer%60);
            document.getElementById('timerBox').innerText = `${min}:${sec.toString().padStart(2, '0')}`;
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
